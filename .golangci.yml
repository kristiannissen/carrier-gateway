version: "2"

linters:
  enable:
    - errcheck       # unhandled errors
    - gosec          # security issues (catches API keys in URLs, etc.)
    - staticcheck    # correctness and performance
    - unused         # unused code
    - govet          # suspicious constructs
    - misspell       # typos in comments and strings
    - godot          # godoc comments end with a period
  settings:
    gosec:
      excludes:
        # G304: file inclusion via variable — acceptable in the CLI input file flag
        - G304
    errcheck:
      check-type-assertions: false
      check-blank: false
  exclusions:
    rules:
      # Test files are exempt from errcheck and gosec — test helpers
      # intentionally discard errors that production code must handle.
      - path: '.*_test\.go'
        linters:
          - errcheck
          - gosec
