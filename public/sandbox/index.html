<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Gateway - Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gatewayPink: '#ff007f', gatewayDark: '#110b15', gatewayCard: '#1a1220' } } }
        }
    </script>
</head>
<body class="bg-gatewayDark text-gray-100 min-h-screen font-sans">
    <nav class="border-b border-gatewayPink/30 bg-gatewayCard/50 backdrop-blur p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white to-gatewayPink">LOGISTICS<span class="text-gatewayPink">.</span>GW</span>
            <div class="space-x-6 text-sm font-semibold">
                <a href="/docs" class="hover:text-gatewayPink transition">Docs</a>
                <a href="/sandbox" class="text-gatewayPink border-b-2 border-gatewayPink pb-1">Sandbox</a>
                <a href="/status" class="hover:text-gatewayPink transition">Status</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
            <h1 class="text-4xl font-black mb-2 tracking-tight">SANDBOX LEGEPLADS</h1>
            <p class="text-gray-400 mb-6">Test et live-kald mod PostNord MVP-gatewayen.</p>
            
            <form id="bookingForm" class="bg-gatewayCard p-6 rounded-xl border border-gatewayPink/10 space-y-4 shadow-xl">
                <div>
                    <label class="block text-xs font-bold tracking-wider text-gatewayPink uppercase mb-1">Carrier</label>
                    <input type="text" id="carrier" value="postnord" class="w-full bg-gatewayDark border border-gatewayPink/20 rounded p-2 text-sm font-mono focus:outline-none focus:border-gatewayPink" readonly>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Afsender Navn</label>
                        <input type="text" id="sName" value="Kristian Nissen" class="w-full bg-gatewayDark border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-gatewayPink">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Modtager Navn</label>
                        <input type="text" id="rName" value="Test Modtager" class="w-full bg-gatewayDark border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-gatewayPink">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Afsender Postnr</label>
                        <input type="text" id="sZip" value="8000" class="w-full bg-gatewayDark border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-gatewayPink">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Pakkevægt (KG)</label>
                        <input type="number" id="weight" value="2.5" step="0.1" class="w-full bg-gatewayDark border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-gatewayPink">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gatewayPink hover:bg-pink-600 text-white font-bold py-2.5 rounded transition shadow-lg shadow-gatewayPink/20">AFSEND TEST ANMODNING 🚀</button>
            </form>
        </div>

        <div>
            <h2 class="text-xl font-bold mb-4 tracking-tight text-gray-400">GATEWAY RESPONS</h2>
            <div class="bg-gatewayCard border border-gatewayPink/20 rounded-xl p-4 h-[400px] overflow-auto font-mono text-xs text-green-400 shadow-xl relative">
                <pre id="jsonResponse">// Tryk på knappen til venstre for at skyde et API-kald afsted...</pre>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resBox = document.getElementById('jsonResponse');
            resBox.innerText = "Behandler kald hos gateway...";
            
            const payload = {
                carrier: document.getElementById('carrier').value,
                sender_name: document.getElementById('sName').value,
                sender_zip: document.getElementById('sZip').value,
                receiver_name: document.getElementById('rName').value,
                weight_kg: parseFloat(document.getElementById('weight').value)
            };

            try {
                const response = await fetch('/api/v1/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                resBox.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                resBox.innerText = "Fejl under kommunikation med API gateway: " + err.message;
            }
        });
    </script>
</body>
</html>
