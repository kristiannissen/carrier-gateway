<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Sandbox</title>
    <style>
        :root {
            --bg-color: #0D0E12;
            --card-bg: #161820;
            --accent-pink: #FF91AF;
            --text-main: #E4E6EB;
            --text-muted: #9EA2B0;
            --border-color: #2A2D3C;
            --terminal-bg: #090A0D;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        header { border-bottom: 1px solid var(--border-color); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--accent-pink); }
        nav a { color: var(--text-muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: var(--accent-pink); }
        
        .container {
            flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
            max-width: 1400px; margin: 2rem auto; padding: 0 2rem; width: calc(100% - 4rem);
        }
        .panel { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; display: flex; flex-direction: column; }
        h2 { font-size: 1.25rem; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem; color: var(--accent-pink); }
        
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 600; }
        select, textarea {
            width: 100%; background-color: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--text-main); border-radius: 6px; padding: 0.75rem; box-sizing: border-box;
            font-family: "SFMono-Regular", Consolas, Monaco, monospace; font-size: 0.9rem; margin-bottom: 1.25rem;
        }
        textarea { flex: 1; resize: none; min-height: 420px; }
        
        .toggle-group { display: flex; gap: 1.5rem; margin-bottom: 1.25rem; background: var(--bg-color); padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border-color); }
        .toggle-item { display: flex; align-items: center; gap: 0.5rem; }
        .toggle-item input[type="radio"] { accent-color: var(--accent-pink); }

        .btn-send {
            background-color: var(--accent-pink); color: var(--bg-color); border: none;
            padding: 0.8rem; font-weight: 700; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: opacity 0.2s;
        }
        .btn-send:hover { opacity: 0.9; }
        
        .terminal {
            background-color: var(--terminal-bg); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 1rem; flex: 1; overflow-y: auto;
            font-family: "SFMono-Regular", Consolas, Monaco, monospace; font-size: 0.85rem; color: #A3BE8C; white-space: pre-wrap;
        }
        .status-badge { font-family: sans-serif; display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-bottom: 1rem; }
        .status-empty { background: #3B4252; color: #E5E9F0; }
        .status-success { background: #434C5E; color: #A3BE8C; border: 1px solid #A3BE8C; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Logistics<span>.Gateway</span></div>
        <nav>
            <a href="/">Home</a>
            <a href="/sandbox.html" class="active">Sandbox</a>
            <a href="/status.html">Status</a>
            <a href="/docs.html">Docs</a>
        </nav>
    </header>
    <div class="container">
        <div class="panel">
            <h2>API Request Payload</h2>
            <label>Carrier Strategy</label>
            <select id="carrierSelect" onchange="updatePayloadTemplate()">
                <option value="dao">DAO (Dansk Avis Distribution)</option>
                <option value="instabee">Instabee (Instabox Lockers)</option>
                <option value="dhl">DHL (Global Express & Freight)</option>
                <option value="budbee">Budbee (Home & Box Delivery)</option>
                <option value="packeta">Packeta (Zásilkovna Pick-up)</option>
            </select>
            
            <label>Execution Routing Preference</label>
            <div class="toggle-group">
                <div class="toggle-item">
                    <input type="radio" id="syncMode" name="routingMode" value="sync" checked>
                    <label style="display:inline; margin:0;" for="syncMode">Synchronous (Real-time labels)</label>
                </div>
                <div class="toggle-item">
                    <input type="radio" id="asyncMode" name="routingMode" value="async">
                    <label style="display:inline; margin:0;" for="asyncMode">Asynchronous (202 Accepted Queue)</label>
                </div>
            </div>
            
            <label>JSON Request Body</label>
            <textarea id="jsonPayload">{
  "destination": {
    "first_name": "Anders",
    "last_name": "And",
    "street_name": "Paradisæblevej",
    "street_number": "111",
    "postal_code": "0900",
    "city": "Andeby",
    "country_code": "DK",
    "type": "residential"
  },
  "colli": [
    {
      "weight_kg": 2.4,
      "dimensions": { "length_cm": 30, "width_cm": 20, "height_cm": 15 }
    }
  ],
  "include_return_label": true
}</textarea>
            <button class="btn-send" onclick="fireRequest()">Dispatch Booking Strategy</button>
        </div>
        
        <div class="panel">
            <h2>Gateway Response Console</h2>
            <div id="statusBadge" class="status-badge status-empty">HTTP Status: Code Pending</div>
            <div id="consoleOut" class="terminal" style="color: #D8DEE9;">// Execute a dispatch request to view the lifecycle response telemetry...</div>
        </div>
    </div>
    <script>
        function updatePayloadTemplate() {
            const carrier = document.getElementById("carrierSelect").value;
            const textarea = document.getElementById("jsonPayload");
            
            if (carrier === "instabee") {
                textarea.value = `{
  "destination": {
    "first_name": "Anders",
    "last_name": "And",
    "street_name": "Paradisæblevej",
    "street_number": "111",
    "postal_code": "0900",
    "city": "Andeby",
    "country_code": "DK",
    "type": "locker",
    "parcel_shop_id": "INSTABOX-BOX-4221"
  },
  "colli": [
    {
      "weight_kg": 1.2,
      "dimensions": { "length_cm": 20, "width_cm": 15, "height_cm": 10 }
    }
  ],
  "include_return_label": false
}`;
            } else if (carrier === "dhl") {
                textarea.value = `{
  "destination": {
    "first_name": "Anders",
    "last_name": "And",
    "street_name": "Paradisæblevej",
    "street_number": "111",
    "postal_code": "2100",
    "city": "København Ø",
    "country_code": "DK",
    "type": "commercial"
  },
  "colli": [
    {
      "weight_kg": 14.5,
      "dimensions": { "length_cm": 60, "width_cm": 40, "height_cm": 40 }
    }
  ],
  "incoterm": "DDP"
}`;
            } else if (carrier === "budbee") {
                textarea.value = `{
  "destination": {
    "first_name": "Anders",
    "last_name": "And",
    "street_name": "Paradisæblevej",
    "street_number": "111",
    "postal_code": "11453",
    "city": "Stockholm",
    "country_code": "SE",
    "type": "residential"
  },
  "colli": [
    {
      "weight_kg": 3.1,
      "dimensions": { "length_cm": 35, "width_cm": 25, "height_cm": 20 }
    }
  ],
  "include_return_label": true
}`;
            } else if (carrier === "packeta") {
                textarea.value = `{
  "destination": {
    "first_name": "Anders",
    "last_name": "And",
    "street_name": "Václavské náměstí",
    "street_number": "1",
    "postal_code": "11000",
    "city": "Praha",
    "country_code": "CZ",
    "type": "locker",
    "parcel_shop_id": "9123"
  },
  "colli": [
    {
      "weight_kg": 1.5,
      "dimensions": { "length_cm": 25, "width_cm": 20, "height_cm": 10 }
    }
  ],
  "include_return_label": false
}`;
            } else {
                textarea.value = `{
  "destination": {
    "first_name": "Anders",
    "last_name": "And",
    "street_name": "Paradisæblevej",
    "street_number": "111",
    "postal_code": "0900",
    "city": "Andeby",
    "country_code": "DK",
    "type": "residential"
  },
  "colli": [
    {
      "weight_kg": 2.4,
      "dimensions": { "length_cm": 30, "width_cm": 20, "height_cm": 15 }
    }
  ],
  "include_return_label": true
}`;
            }
        }

        async function fireRequest() {
            const consoleOut = document.getElementById("consoleOut");
            const badge = document.getElementById("statusBadge");
            const carrier = document.getElementById("carrierSelect").value;
            const isAsync = document.getElementById("asyncMode").checked;
            
            let rawJson = document.getElementById("jsonPayload").value;
            let payload;
            try {
                payload = JSON.parse(rawJson);
            } catch(e) {
                alert("Invalid JSON schema in payload editor");
                return;
            }
            
            payload.carrier_code = carrier;
            payload.is_async = isAsync;
            
            consoleOut.innerText = "Transmitting telemetry payload over HTTP wire...";
            badge.className = "status-badge status-empty";
            badge.innerText = "HTTP Status: Processing...";

            // Dynamically allocate endpoints based on routing matrix
            let endpoint = '/api/v1/dao-bookings';
            if (carrier === "instabee") endpoint = '/api/v1/instabee-bookings';
            if (carrier === "dhl") endpoint = '/api/v1/dhl-bookings';
            if (carrier === "budbee") endpoint = '/api/v1/budbee-bookings';
            if (carrier === "packeta") endpoint = '/api/v1/packeta-bookings';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Prefer': isAsync ? 'respond-async' : 'respond-sync'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                badge.className = "status-badge status-success";
                badge.innerText = `HTTP Status: ${response.status} ${response.statusText}`;
                consoleOut.style.color = "#A3BE8C";
                consoleOut.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                badge.className = "status-badge";
                badge.style.background = "#BF616A";
                badge.innerText = "HTTP Status: Network Failure";
                consoleOut.style.color = "#BF616A";
                consoleOut.innerText = err.toString();
            }
        }
    </script>
</body>
</html>
