<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Gateway - System Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { gatewayPink: '#ff007f', gatewayDark: '#110b15', gatewayCard: '#1a1220' } } }
        }
    </script>
</head>
<body class="bg-gatewayDark text-gray-100 min-h-screen font-sans">
    <nav class="border-b border-gatewayPink/30 bg-gatewayCard/50 backdrop-blur p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white to-gatewayPink">LOGISTICS<span class="text-gatewayPink">.</span>GW</span>
            <div class="space-x-6 text-sm font-semibold">
                <a href="/docs" class="hover:text-gatewayPink transition">Docs</a>
                <a href="/sandbox" class="hover:text-gatewayPink transition">Sandbox</a>
                <a href="/status" class="text-gatewayPink border-b-2 border-gatewayPink pb-1">Status</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-16 text-center">
        <h1 class="text-4xl font-black mb-8 tracking-tight">SYSTEM STATUS</h1>
        
        <div class="bg-gatewayCard border border-gatewayPink/10 rounded-2xl p-8 shadow-2xl mb-6 inline-block w-full max-w-md">
            <div class="flex justify-center mb-6">
                <div id="statusDot" class="w-16 h-16 rounded-full bg-gatewayPink animate-pulse flex items-center justify-center shadow-lg shadow-gatewayPink/50">
                    <span class="text-2xl">⚡</span>
                </div>
            </div>
            <h2 id="statusTitle" class="text-2xl font-black uppercase tracking-wide">Indlæser...</h2>
            <p id="statusDesc" class="text-gray-400 mt-2 text-sm">Henter live helbredsstatus fra vores europæiske noder.</p>
        </div>

        <div class="max-w-md mx-auto bg-gatewayCard/40 border border-gray-800 rounded-xl p-4 text-left space-y-3 font-mono text-xs">
            <div class="flex justify-between border-b border-gray-800 pb-2">
                <span class="text-gray-400">Gateway API Engine:</span>
                <span id="engStatus" class="text-gatewayPink font-bold">CHECKING...</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-400">PostNord API Bridge:</span>
                <span id="pnStatus" class="text-gatewayPink font-bold">CHECKING...</span>
            </div>
        </div>
    </main>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/v1/status');
                const data = await response.json();
                
                const dot = document.getElementById('statusDot');
                const title = document.getElementById('statusTitle');
                const eng = document.getElementById('engStatus');
                const pn = document.getElementById('pnStatus');

                if(data.gateway === "healthy") {
                    dot.className = "w-16 h-16 rounded-full bg-green-500 flex items-center justify-center shadow-lg shadow-green-500/30";
                    title.innerText = "Alle systemer kører";
                    title.className = "text-2xl font-black uppercase tracking-wide text-green-400";
                    eng.innerText = "OPERATIONAL";
                    eng.className = "text-green-400 font-bold";
                } else {
                    throw new Error("Gateway unhealthy");
                }

                if(data.integrations && data.integrations.postnord.includes("operational")) {
                    pn.innerText = data.integrations.postnord.toUpperCase();
                    pn.className = "text-green-400 font-bold";
                } else {
                    pn.innerText = "ERROR / DOWN";
                    pn.className = "text-red-500 font-bold";
                    dot.className = "w-16 h-16 rounded-full bg-red-500 flex items-center justify-center shadow-lg shadow-red-500/30";
                    title.innerText = "Problemer registreret";
                    title.className = "text-2xl font-black uppercase tracking-wide text-red-500";
                }

            } catch (err) {
                document.getElementById('statusDot').className = "w-16 h-16 rounded-full bg-red-600 flex items-center justify-center shadow-lg shadow-red-600/50";
                document.getElementById('statusTitle').innerText = "Gateway utilgængelig";
                document.getElementById('statusTitle').className = "text-2xl font-black text-red-500";
            }
        }
        window.onload = fetchStatus;
    </script>
</body>
</html>
