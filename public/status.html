<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Status Monitor</title>
    <style>
        :root {
            --bg-color: #0D0E12;
            --card-bg: #161820;
            --accent-pink: #FF91AF;
            --text-main: #E4E6EB;
            --text-muted: #9EA2B0;
            --border-color: #2A2D3C;
            --green-success: #A3BE8C;
            --red-failure: #BF616A;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        header { border-bottom: 1px solid var(--border-color); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--accent-pink); }
        nav a { color: var(--text-muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: var(--accent-pink); }
        
        main { flex: 1; max-width: 900px; margin: 3rem auto; padding: 0 2rem; width: calc(100% - 4rem); }
        h1 { font-size: 2rem; margin-bottom: 2rem; }
        
        .overall-banner {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            padding: 1.5rem; border-radius: 8px; display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;
        }
        .indicator { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
        .bg-success { background-color: var(--green-success); box-shadow: 0 0 12px var(--green-success); }
        .bg-failure { background-color: var(--red-failure); box-shadow: 0 0 12px var(--red-failure); }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 3rem; }
        .status-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            padding: 1.25rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .carrier-name { font-weight: 600; font-size: 1.05rem; }
        .badge { padding: 0.35rem 0.7rem; border-radius: 4px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .badge-operational { background: rgba(163, 190, 140, 0.15); color: var(--green-success); border: 1px solid var(--green-success); }
        .badge-degraded { background: rgba(191, 97, 106, 0.15); color: var(--red-failure); border: 1px solid var(--red-failure); }
        
        .incident-log { background-color: #090A0D; border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; }
        .incident-title { color: var(--accent-pink); font-size: 1.1rem; margin-top: 0; margin-bottom: 1rem; font-weight: 700; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; text-align: left; }
        .log-table th { color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding: 0.75rem 0.5rem; font-size: 0.8rem; text-transform: uppercase; }
        .log-table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: top; }
        .time-col { color: var(--text-muted); font-family: monospace; width: 160px; }
        .err-msg { color: #D8DEE9; font-family: monospace; }
        .empty-log { color: var(--text-muted); text-align: center; padding: 2rem 0; font-style: italic; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Logistics<span>.Gateway</span></div>
        <nav>
            <a href="/">Home</a>
            <a href="/sandbox.html">Sandbox</a>
            <a href="/status.html" class="active">Status</a>
            <a href="/docs.html">Docs</a>
        </nav>
    </header>
    <main>
        <h1>System Performance Status</h1>
        
        <div class="overall-banner">
            <div id="globalIndicator" class="indicator bg-success"></div>
            <span id="globalText" style="font-weight: 700; font-size: 1.2rem;">All Infrastructure Systems Operational</span>
        </div>

        <div class="grid" id="carrierGrid">
            </div>

        <div class="incident-log">
            <div class="incident-title">Live Exception & Outage Logs</div>
            <table class="log-table">
                <thead>
                    <tr>
                        <th class="time-col">Timestamp</th>
                        <th style="width: 100px;">Carrier</th>
                        <th>Operational Interruption Event</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    </tbody>
            </table>
            <div id="emptyNotify" class="empty-log" style="display: none;">No system operational exceptions reported within this epoch.</div>
        </div>
    </main>
    <script>
        async function fetchHealthMetrics() {
            try {
                const response = await fetch('/api/v1/status');
                const data = await response.json();
                
                // 1. Update Carrier Integration List Cards
                const grid = document.getElementById("carrierGrid");
                grid.innerHTML = "";
                let systemDegraded = false;

                data.carriers.forEach(c => {
                    const isOp = c.status === "operational";
                    if(!isOp) systemDegraded = true;

                    grid.innerHTML += `
                        <div class="status-card">
                            <span class="carrier-name">${c.Name}</span>
                            <span class="badge ${isOp ? 'badge-operational' : 'badge-degraded'}">${c.status}</span>
                        </div>
                    `;
                });

                // 2. Global State Master Switch
                const gIndicator = document.getElementById("globalIndicator");
                const
