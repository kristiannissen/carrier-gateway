      description: "A2 code of the Out of Home Location's address' country."
      example: "DE"
    Address:
      type: "object"
      required:
      - "countryCode"
      - "city"
      - "street"
      - "latitude"
      - "longitude"
      properties:
        street:
          type: "string"
          maxLength: 255
          example: "GLS-Germany-Straße"
        houseNumber:
          type: "string"
          maxLength: 255
          example: "1-7"
        city:
          type: "string"
          maxLength: 255
          example: "Neuenstein"
        zipCode:
          type: "string"
          maxLength: 255
          example: "36286"
        province:
          type: "string"
          maxLength: 255
          example: "Hessen"
        countryCode:
          $ref: "#/components/schemas/CountryCode"
        latitude:
          type: "number"
          format: "float"
          minimum: -180
          maximum: 180
          description: "Latitude of the Out of Home Location's address."
          example: 50.90849
        longitude:
          type: "number"
          format: "float"
          minimum: -90
          maximum: 90
          description: "Longitude of the Out of Home Location's address."
          example: 9.58712
        geocodeQualityLevel:
          type: "string"
          enum:
          - "HOUSENUMBER"
          - "STREET"
          - "CITY"
          - "DISTRICT"
          - "UNKNOWN"
          example: "HOUSENUMBER"
        additionalInfo:
          type: "string"
          description: "Further (free-text) details on the Out of Home Location's\
            \ address."
          maxLength: 255
          example: "Entrance via back alley"
      example:
        street: "GLS-Germany-Straße"
        houseNumber: "1-7"
        city: "Neuenstein"
        zipCode: "36286"
        province: "Hessen"
        countryCode: "DE"
        latitude: 51.90653
        longitude: 12.52653
        geocodeQualityLevel: "HOUSENUMBER"
        additionalInfo: "Entrance via back alley"
    ParcelHandlingRestriction:
      type: "object"
      properties:
        maxParcelWeight:
          type: "number"
          format: "float"
          description: "Maximum weight (in kilogramms, kg) of a Parcel that the Out\
            \ of Home Location can handle."
          example: 3.5
        maxParcelLength:
          type: "number"
          format: "float"
          description: "Maximum length (in centimeters, cm) of a Parcel that the Out\
            \ of Home Location can handle."
          example: 100
        canHandleTyres:
          type: "string"
          example: "N"
          description: "Out of Home Location is equipped and has agreed to handle\
            \ Parcels with tyres."
          enum:
          - "Y"
          - "N"
        canHandleHG:
          type: "string"
          example: "N"
          description: "Out of Home Location is equipped and has agreed to handle\
            \ Parcels with Hazardous Goods."
          enum:
          - "Y"
          - "N"
        offersParcelCollection:
          type: "string"
          example: "Y"
          enum:
          - "Y"
          - "N"
          description: "Consignees can collect Parcels delivered to the Out of Home\
            \ Location, e.g. with ShopDeliveryService."
        offersReturnDropOff:
          type: "string"
          example: "Y"
          enum:
          - "Y"
          - "N"
          description: "Out of Home Location accepts Parcels with regular Return Label\
            \ or mobile Return Label (where offered), e.g. with ShopReturnService."
        offersLabelPurchase:
          type: "string"
          example: "Y"
          enum:
          - "Y"
          - "N"
          description: "Shippers can pay for Parcel shipping and buy a Label in the\
            \ Out of Home Location."
        offersPrepaidParcelDropOff:
          type: "string"
          example: "Y"
          enum:
          - "Y"
          - "N"
          description: "Shippers can drop off prepaid Parcels with regular Label or\
            \ mobile Label (where offered)."
      example:
        canHandleTyres: "UNKNOWN"
        canHandleHG: "UNKNOWN"
        offersParcelCollection: "Y"
        offersReturnDropOff: "Y"
        offersLabelPurchase: "N"
        offersPrepaidParcelDropOff: "N"
    PartnerId:
      type: "string"
      description: "Identifier of the Partner, i.e. typically a GLS Organization or\
        \ another chain operating multiple Out of Home Locations."
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_-]"
      example: "GLS_DE"
    OpeningDay:
      type: "object"
      required:
      - "weekday"
      - "hours"
      properties:
        weekday:
          type: "string"
          enum:
          - "MON"
          - "TUE"
          - "WED"
          - "THU"
          - "FRI"
          - "SAT"
          - "SUN"
          description: "Day of week the record is valid for."
          example: "MON"
        hours:
          type: "array"
          items:
            type: "object"
            required:
            - "openingTime"
            - "closingTime"
            properties:
              openingTime:
                type: "string"
                format: "HH:MM"
                description: "Local time when the Out of Home Location opens."
                example: "08:00"
              closingTime:
                type: "string"
                format: "HH:MM"
                description: "Local time when the Out of Home Location closes."
                example: "16:00"
            example:
              openingTime: "08:00"
              closingTime: "16:00"
          example:
          - openingTime: "08:00"
            closingTime: "16:00"
      example:
        weekday: "MON"
        hours:
        - openingTime: "05:00"
          closingTime: "23:00"
    Vacation:
      type: "object"
      required:
      - "startDate"
      properties:
        startDate:
          type: "string"
          format: "YYYY-mm-dd"
          description: "Date (at 00:00:00) in UTC from which the Out of Home Location\
            \ is on vacation."
          example: "2020-09-10"
        endDate:
          type: "string"
          format: "YYYY-mm-dd"
          description: "Date (at 23:59:59) in UTC until which the Out of Home Location\
            \ is on vacation. May be null or omitted"
          example: "2020-09-18"
      example:
        startDate: "2020-12-12"
        endDate: "2021-01-01"
    GeneralError:
      type: "object"
      properties:
        type:
          description: "Machine-readable error type."
          type: "string"
          example: "MINMAX-CONSTRAINT-VIOLATED"
        fieldName:
          type: "string"
          description: "Name of field where error occurred."
          example: "limit"
        fieldValue:
          type: "string"
          description: "Field value where error occurred."
          example: "-12"
        documentationUrl:
          type: "string"
          description: "Link to further help on the error."
          example: "https://dev-portal.gls-group.net/error-codes?code=MINMAX-CONSTRAIN-VIOLATED"
  securitySchemes:
    OAuthSandbox:
      description: "This API can be used with OAuth 2 with the client credentials\
        \ grant flow. For production integration please use https://api.gls-group.net/oauth2/v2/token\
        \ to retrieve a production token. Note that below services require authentication\
        \ via OAuth Client Credentials flow - use our Authentication API to issue\
        \ a token."
      type: "oauth2"
      flows:
        clientCredentials:
          tokenUrl: "https://api-sandbox.gls-group.net/oauth2/v2/token"
          scopes: {}
security:
- OAuthSandbox: []
