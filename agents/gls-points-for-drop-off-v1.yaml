    \ and 100 in sandbox.**<br>Depending on the circumstances, the maximum value may\
    \ get increased for an app upon manual request.<br><br><br>This API retrieves\
    \ currently available GLS Points for parcel Drop-off, Returns, and C2C use cases\
    \ based on a provided address. Note that fields with value NULL may be omitted\
    \ (both in request and response).<br><br><hr><br><sub><sup> Corporate information:\
