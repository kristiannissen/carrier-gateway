  version: "1.0.0"
  title: "GLS Points for Drop-off (by address) API v1"
  termsOfService: "https://dev-portal.gls-group.net/terms"
servers:
- url: "https://api-sandbox.gls-group.net/parcel-shop-management/v2"
  description: "Sandbox (uses test data)"
- url: "https://api-qas.gls-group.net/parcel-shop-management/v2"
  description: "QAS (used for integration tests)"
- url: "https://api.gls-group.net/parcel-shop-management/v2"
  description: "Production (uses live data)"
paths:
  /gls-points-for-drop-off:
    get:
      tags:
      - "Parcel Shop retrieval"
      security:
      - OAuthSandbox: []
      summary: "Get multiple, available public GLS Points by address that are eligible\
        \ for dropping off a return parcel"
      description: "Retrieve public information of max. 5 GLS Points close to a given\
        \ address, which are available at least half of the next 14 days, i.e. they\
        \ are active, open, not on vacation or in maintenance and offer return drop\
        \ off service. And those shops need to be active, not on vacation or in maintenance\
        \ for 2 days after these 14 days. Optionally filtered by e.g. distance."
      operationId: "getGLSPointsForReturn"
      parameters:
      - name: "address"
        in: "query"
        description: "Address in human readable sequence to search for Out of Home\
          \ Locations in close proximity, typically contains a street name, a house\
          \ number, a zip code and a city name (but no country name)."
        required: true
        schema:
          type: "string"
          example: "Kölner Str. 3, 65760 Eschborn"
          minLength: 1
          maxLength: 255
      - name: "X-Message-ID"
        in: "header"
        description: "Used to correlate requests with their responses within a customer's\
          \ application, for logging and error reporting."
        required: false
        schema:
          type: "string"
          example: "123e4567-e89b-12d3-a456-426614174000"
      - name: "countryCode"
        in: "query"
        description: "A2 code of the Address' country."
        required: true
        schema:
          $ref: "#/components/schemas/CountryCode"
        example: "DE"
      - name: "limit"
        in: "query"
        description: "Maximum number of Out of Home Locations records to retrieve."
        required: false
        schema:
          type: "integer"
          default: 5
          minimum: 1
          maximum: 5
          example: 5
      - name: "distance"
        in: "query"
        description: "Radius in km to search available Out of Home Locations in, measured\
          \ from given \"address\"."
        required: false
        schema:
          type: "integer"
          default: 10
          minimum: 0
          maximum: 50
          example: 5
      - name: "extraAvailabilityDays"
        in: "query"
        description: "Number of days after the calculated availability period, where\
          \ the shop is not allowed to be on vacation, in maintenance or inactive."
        required: false
        schema:
          type: "integer"
          default: 2
          minimum: 0
          maximum: 100
          example: 2
      - in: "query"
        name: "resultCountryCodes"
        description: "Only return Out of Home Locations with an address in one of\
          \ the countries defined by these A2 codes."
        required: false
        schema:
          type: "array"
          items:
            $ref: "#/components/schemas/CountryCode"
          uniqueItems: true
        explode: false
      responses:
        "200":
          description: "OK."
          headers:
            X-RateLimit-Limit:
              schema:
                type: "integer"
              description: "Max Quota value."
            X-RateLimit-Remaining:
              schema:
                type: "integer"
              description: "Remaining Quota value for current App."
            X-RateLimit-Policy:
              schema:
                type: "string"
              description: "Policy when Quota is reset."
            X-RateLimit-Reset:
              schema:
                format: "int64"
                type: "integer"
              description: "The UTC time in milliseconds when the Quota expires and\
                \ new Quota interval starts."
            X-Message-ID:
              schema:
                type: "string"
              description: "Used to correlate requests with their responses within\
                \ a customer's application, for logging and error reporting."
            X-Valid-Country-Codes:
              schema:
                type: "string"
              description: "All A2 country codes for which OOH locations exist."
          content:
            application/json:
              schema:
                type: "object"
                required:
                - "data"
                - "limit"
                properties:
                  data:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/OutOfHomeLocation"
                  limit:
                    type: "number"
                    format: "integer"
                    description: "Maximum number of records retrieved."
                    example: 50
              example:
                data:
                - distance: 3.0437768
                  partnerId: "GLS_DE"
                  parcelShopId: "NewTest"
                  name: "Test"
                  type: "LOCKER"
                  address:
                    street: "GLS-Germany-Straße"
                    houseNumber: "1-7"
                    city: "Neuenstein"
                    zipCode: "36286"
                    province: "Hessen"
                    countryCode: "DE"
                    latitude: 51.90653
                    longitude: 12.52653
                    geocodeQualityLevel: "HOUSENUMBER"
                    additionalInfo: "Entrance via back alley"
                  externalContactDetails:
                    email: "meierandsons@gls-group.eu"
                    mobile: "+49987654321"
                  parcelHandlingRestriction:
                    canHandleTyres: "UNKNOWN"
                    canHandleHG: "UNKNOWN"
                    offersParcelCollection: "Y"
                    offersReturnDropOff: "Y"
                    offersLabelPurchase: "N"
                    offersPrepaidParcelDropOff: "N"
                  paymentMethods:
                  - "CASH"
                  parkingAvailable: "Y"
                  handicappedAccessAvailable: "UNKNOWN"
                  spokenLanguages:
                  - "ab"
                  - "en"
                  - "de"
                  vacations:
                  - startDate: "2023-12-12"
                    endDate: "2023-12-14"
                  openingDays:
                  - weekday: "MON"
                    hours:
                    - openingTime: "05:00"
                      closingTime: "23:00"
                  - weekday: "TUE"
                    hours:
                    - openingTime: "05:00"
                      closingTime: "23:00"
                  - weekday: "WED"
                    hours:
                    - openingTime: "05:00"
                      closingTime: "23:00"
                  - weekday: "THU"
                    hours:
                    - openingTime: "05:00"
                      closingTime: "23:00"
                  - weekday: "FRI"
                    hours:
                    - openingTime: "05:00"
                      closingTime: "23:00"
                  - weekday: "SAT"
                    hours:
                    - openingTime: "05:00"
                      closingTime: "23:00"
                limit: 1
        "400":
          description: "Bad Request."
          headers:
            X-RateLimit-Limit:
              schema:
                type: "integer"
              description: "Max Quota value."
            X-RateLimit-Remaining:
              schema:
                type: "integer"
              description: "Remaining Quota value for current App."
            X-RateLimit-Policy:
              schema:
                type: "string"
              description: "Policy when Quota is reset."
            X-RateLimit-Reset:
              schema:
                format: "int64"
                type: "integer"
              description: "The UTC time in milliseconds when the Quota expires and\
                \ new Quota interval starts."
            X-Message-ID:
              schema:
                type: "string"
              description: "Used to correlate requests with their responses within\
                \ a customer's application, for logging and error reporting."
            X-Valid-Country-Codes:
              schema:
                type: "string"
              description: "All A2 country codes for which OOH locations exist."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/GeneralError"
        "401":
          description: "Authorization header must contain a valid bearer token"
        "403":
          description: "User is not allowed to access resource."
        "408":
          description: "A Timeout has occurred while processing a request, please\
            \ retry."
          headers:
            X-RateLimit-Limit:
              schema:
                type: "integer"
              description: "Max Quota value."
            X-RateLimit-Remaining:
              schema:
                type: "integer"
              description: "Remaining Quota value for current App."
            X-RateLimit-Policy:
              schema:
                type: "string"
              description: "Policy when Quota is reset."
            X-RateLimit-Reset:
              schema:
                format: "int64"
                type: "integer"
              description: "The UTC time in milliseconds when the Quota expires and\
                \ new Quota interval starts."
            X-Message-ID:
              schema:
                type: "string"
              description: "Used to correlate requests with their responses within\
                \ a customer's application, for logging and error reporting."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/GeneralError"
        "429":
          description: "User is neither allowed to exceed 10000 total requests to\
            \ Out of Home Location Finder API per day, nor 70 requests per second."
          headers:
            X-RateLimit-Limit:
              schema:
                type: "integer"
              description: "Max Quota value."
            X-RateLimit-Remaining:
              schema:
                type: "integer"
              description: "Remaining Quota value for current App."
            X-RateLimit-Policy:
              schema:
                type: "string"
              description: "Policy when Quota is reset."
            X-RateLimit-Reset:
              schema:
                format: "int64"
                type: "integer"
              description: "The UTC time in milliseconds when the Quota expires and\
                \ new Quota interval starts."
components:
  schemas:
    OutOfHomeLocation:
      type: "object"
      required:
      - "distance"
      - "partnerId"
      - "parcelShopId"
      - "name"
      - "address"
      properties:
        distance:
          type: "number"
          format: "float"
          description: "Distance between given \"address\" and Out of Home Location\
            \ address in km."
          example: 1.15
        partnerId:
          type: "string"
          description: "Identifier of the Partner, i.e. typically a GLS Organization\
            \ or another chain operating multiple Out of Home Locations."
          minLength: 1
          maxLength: 255
          pattern: "[a-zA-Z0-9_-]*"
          example: "GLS_DE"
        parcelShopId:
          type: "string"
          description: "Identifier of the Out of Home Location, unambiguous in the\
            \ Partner's namespace."
          minLength: 1
          maxLength: 255
          pattern: "[a-zA-Z0-9+_-]"
          example: "2764127573XYZ"
        parentParcelShopId:
          type: "string"
          description: "Identifier of the Out of Home Location's parent company, unambiguous\
            \ in the Partner's namespace."
          minLength: 1
          maxLength: 255
          pattern: "[a-zA-Z0-9+_-]"
          example: "2764127573XYZ"
        name:
          type: "string"
          maxLength: 255
          example: "Meier and Sons"
        type:
          $ref: "#/components/schemas/Type"
        parcelHandlingRestriction:
          $ref: "#/components/schemas/ParcelHandlingRestriction"
        externalContactDetails:
          type: "object"
          properties:
            phone:
              type: "string"
              maxLength: 255
              example: "+49 123 456789"
            email:
              type: "string"
              maxLength: 255
              example: "myemail@email.com"
          example:
            email: "meierandsons@gls-group.eu"
            mobile: "+49987654321"
        address:
          $ref: "#/components/schemas/Address"
        paymentMethods:
          type: "array"
          items:
            type: "string"
            enum:
            - "CASH"
            - "AMEX"
            - "VISA"
            - "DINERS"
            - "MASTERCARD"
            - "VPAY"
            - "MAESTRO"
            - "GIROCARD"
            - "APPLEPAY"
            - "GOOGLEPAY"
            - "UNKNOWN"
            description: "Payment options offered by the Out of Home Location to Customers."
            example: "CASH"
          example:
          - "CASH"
          - "MASTERCARD"
          default:
          - "UNKNOWN"
        parkingAvailable:
          type: "string"
          enum:
          - "Y"
          - "N"
          - "UNKNOWN"
          description: "Identifies whether parking spaces are available for Customers."
          default: "UNKNOWN"
        inMaintenanceFrom:
          type: "string"
          format: "YYYY-MM-dd"
          description: "Date in UTC from which the Parcel Shop is considered in maintenance\
            \ (i.e. not handles Parcels), activity starts at 00:00:00 local time.\
            \ An empty value indicates that the Parcel Shop is active. In maintenance\
            \ shops will show a message that they are in maintenance via the public\
            \ API, but are visible on the map."
          example: "2019-01-01"
        inMaintenanceTo:
          type: "string"
          format: "YYYY-MM-dd"
          description: "Date in UTC until the Parcel Shop is considered in maintenance\
            \ (i.e. not handles Parcels), activity ends at 23:59:59 local time. Must\
            \ be equal or larger than inMaintenanceFrom. An empty value indicates\
            \ that the Parcel Shop is in maintenance without any defined end date."
          example: "2019-12-31"
        handicappedAccessAvailable:
          type: "string"
          enum:
          - "Y"
          - "N"
          - "UNKNOWN"
          description: "Identifies whether handicapped access is available for Customers."
          default: "UNKNOWN"
        parcelExchangeTime:
          type: "string"
          format: "HH:MM"
          description: "Local time when Parcels typically get delivered to or get\
            \ collected from the Out of Home Location; useful to calculate thresholds\
            \ like \"bring your Parcel until 18h and it will be collected the same\
            \ day\"."
          example: "18:00"
