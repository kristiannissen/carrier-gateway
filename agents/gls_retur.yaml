paths:
  /{app-id}/return-orders:
    post:
      tags:
      - "Create Return Order"
      summary: "Create a new Return Order"
      description: "Create a new Return Order. From the response use the `returnOrderId`\
        \ to get its data, such as label."
      operationId: "createReturnOrder"
      security:
      - OAuthSandbox: []
      responses:
        "201":
          description: "Successfully created a new Return Order."
          headers:
            X-RateLimit-Limit:
              schema:
                type: "integer"
              description: "Max Quota value (Optional)."
            X-RateLimit-Remaining:
              schema:
                type: "integer"
              description: "Remaining Quota value for current App (Optional)."
            X-RateLimit-Policy:
              schema:
                type: "string"
              description: "Policy when Quota is reset (Optional)."
            X-RateLimit-Reset:
              schema:
                format: "int64"
                type: "integer"
              description: "The UTC time in milliseconds when the Quota expires and\
                \ new Quota interval starts (Optional)."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  returnOrderId:
                    type: "string"
                  references:
                    $ref: "#/components/schemas/References"
                  nationalReferences:
                    $ref: "#/components/schemas/nationalReferences"
        "401":
          description: "Authorization header must contain a valid bearer token."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "403":
          description: "Credential is not allowed to access this API."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "429":
          description: "User is not allowed to exceed 20000 total requests to the\
            \ Shop Returns API per day."
          headers:
            X-RateLimit-Limit:
              schema:
                type: "integer"
              description: "Max Quota value (Optional)."
            X-RateLimit-Remaining:
              schema:
                type: "integer"
              description: "Remaining Quota value for current App (Optional)."
            X-RateLimit-Policy:
              schema:
                type: "string"
              description: "Policy when Quota is reset (Optional)."
            X-RateLimit-Reset:
              schema:
                format: "int64"
                type: "integer"
              description: "The UTC time in milliseconds when the Quota expires and\
                \ new Quota interval starts."
        "4XX":
          description: "Bad Request. Something went wrong on your side."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "5XX":
          description: "Internal Server Error. Something went wrong on our side."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Internal Server Error"
                  context:
                    type: "object"
                    properties:
                      messageId:
                        type: "string"
      parameters:
      - in: "path"
        name: "app-id"
        required: true
        example: "sandbox"
        description: "App associated with your credentials that has permissions to\
          \ create return orders in ISRS."
        schema:
          type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReturnOrder"
