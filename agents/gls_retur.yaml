                    example: "Internal Server Error"
                  context:
                    type: "object"
                    properties:
                      messageId:
                        type: "string"
      parameters:
      - in: "path"
        name: "app-id"
        required: true
        example: "sandbox"
        description: "App associated with your credentials that has permissions to\
          \ create return orders in ISRS."
        schema:
          type: "string"
      - in: "path"
        required: true
        name: "label-format"
        schema:
          $ref: "#/components/schemas/LabelFormat"
      - in: "query"
        name: "labelDpi"
        schema:
          $ref: "#/components/schemas/LabelDpi"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReturnOrder"
        required: true
  /return-orders/{return-order-id}/{label-type}:
    get:
      tags:
      - "Get Return Order"
      summary: "Get a Return Order's Label in JSON format"
      description: "Get a JSON object containing the Base64-encoded label or parcelShopQrCode."
      operationId: "getReturnOrderLabel"
      security:
      - OAuthSandbox: []
      parameters:
      - in: "path"
        name: "return-order-id"
        description: "The id of the Return Order to get label data for"
        example: "d137d614-ccc0-4d09-b956-9fc7483e7993"
        required: true
        schema:
          type: "string"
      - in: "path"
        name: "label-type"
        description: "Please note that the labelType `parcelshop-qrcode` is only supported\
          \ for AT, BE, DE, DK, LU"
        required: true
        schema:
          $ref: "#/components/schemas/LabelType"
      - in: "query"
        name: "labelFormat"
        schema:
          $ref: "#/components/schemas/LabelFormat"
      - in: "query"
        name: "labelDpi"
        schema:
          $ref: "#/components/schemas/LabelDpi"
      responses:
        "200":
          description: "The Return Order Label"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReturnOrderResponse"
        "401":
          description: "Authorization header must contain a valid bearer token."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "403":
          description: "Credential is not allowed to access this API."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "4XX":
          description: "Bad Request. Something went wrong on your side."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "5XX":
          description: "Internal Server Error. Something went wrong on our side."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Internal Server Error"
                  context:
                    type: "object"
                    properties:
                      messageId:
                        type: "string"
  /return-orders/{return-order-id}/{label-type}/{label-format}:
    get:
      tags:
      - "Get Return Order"
      summary: "Get a Return Order's Label in raw format"
      description: "Get the label in the selected label-format. The media type must\
        \ match the label-format."
      security:
      - OAuthSandbox: []
      parameters:
      - in: "path"
        name: "return-order-id"
        description: "The id of the Return Order to get the label for"
        example: "d137d614-ccc0-4d09-b956-9fc7483e7993"
        required: true
        schema:
          type: "string"
      - in: "path"
        name: "label-type"
        required: true
        description: "Please note that the labelType `parcelshop-qrcode` is only supported\
          \ for AT, BE, DE, DK, LU"
        schema:
          $ref: "#/components/schemas/LabelType"
      - in: "path"
        name: "label-format"
        description: "Output format of the label"
        required: true
        schema:
          $ref: "#/components/schemas/LabelFormat"
      responses:
        "200":
          description: "OK"
          content:
            '*/*': {}
            application/pdf:
              schema:
                type: "string"
                format: "binary"
            image/png:
              schema:
                type: "string"
                format: "binary"
            text/plain:
              schema:
                type: "string"
        "401":
          description: "Authorization header must contain a valid bearer token."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "403":
          description: "Credential is not allowed to access this API."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "4XX":
          description: "Bad Request. Something went wrong on your side."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ErrorResponseBody"
        "5XX":
          description: "Internal Server Error. Something went wrong on our side."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message:
                    type: "string"
                    example: "Internal Server Error"
                  context:
                    type: "object"
                    properties:
                      messageId:
                        type: "string"
components:
  schemas:
    languageCode:
      type: "string"
      description: "The language code determines in which language the label will\
        \ be provided. Small letters required.<br/>⚠ Note that we constantly update\
        \ our translations to provide the best possible customer experience. In case\
        \ of missing translations corresponding texts will fallback to English (en)."
      enum:
      - "de"
      - "da"
      - "pl"
      - "fr_be"
      - "fr"
      - "hu"
      - "nl_be"
      - "nl"
      - "el"
      - "en"
      - "es"
      - "it"
      - "fi"
      - "pt"
      - "hr"
      - "sl"
      - "sk"
      - "cs"
      - "sv"
      - "lt"
      - "lv"
      - "et"
    CreateReturnOrder:
      type: "object"
      required:
      - "originalOrderReference"
      - "returnReason"
      - "sender"
      - "receiver"
      properties:
        originalOrderReference:
          type: "string"
          format: "First 256 characters in the unicode table. Greek uppercase: Between\
            \ Α and Ω. Greek lowercase: Between α and ω. Others: Ą, ą, Ă, ă, Ć, ć\
            , Č, č, Ď, ď, Ď, Đ, đ, Ě, ě, Ę, ę, Ĺ, ĺ, Ł, Ľ, ľ, ł, Ń, ń, Ň, ň, Ő, ő\
            , Ř, ř, Ŕ, ŕ, Ş, ş, Š, š, Ś, ś, Ţ, ţ, Ť, ť, Ů, ů, Ű, ű, Ź, ź, Ż, ż, Ž\
            , ž. Please note, that the | and line breaks are disallowed."
          minLength: 1
          maxLength: 255
          description: "The order number of the return. This value will be printed\
            \ on the label.<br>⚠ Note that `maxLength` is reduced to 40 if the sender.address.countryCode\
            \ is `FI` or `IT`. For `GB` it is reduced to 24."
        returnReason:
          type: "string"
          minLength: 1
          maxLength: 255
          description: "The reason for the return. This information is not yet used."
        sender:
          $ref: "#/components/schemas/Sender"
        receiver:
          $ref: "#/components/schemas/Receiver"
        parcel:
          $ref: "#/components/schemas/Parcel"
        options:
          $ref: "#/components/schemas/Options"
        additionalReferences:
          $ref: "#/components/schemas/AdditionalReferences"
    CreateReturnOrderResponse:
      description: "Parcel information."
      properties:
        returnOrderId:
          type: "string"
        references:
          $ref: "#/components/schemas/References"
        nationalReferences:
          $ref: "#/components/schemas/nationalReferences"
        label:
          type: "object"
          properties:
            contentType:
              type: "string"
              enum:
              - "application/pdf"
              - "image/png"
              - "text/plain"
            content:
              type: "string"
    CreateReturnOrderResponseQrCode:
      description: "Parcel information."
      properties:
        returnOrderId:
          type: "string"
        references:
          $ref: "#/components/schemas/References"
        nationalReferences:
          $ref: "#/components/schemas/nationalReferences"
        parcelShopQrCode:
          type: "object"
          properties:
            contentType:
              type: "string"
              enum:
              - "application/pdf"
              - "image/png"
              - "text/plain"
            content:
              type: "string"
    Options:
      type: "object"
      description: "Optional field for custom configurations."
      properties:
        confirmationMail:
          $ref: "#/components/schemas/ConfirmationMail"
        languageCode:
          $ref: "#/components/schemas/languageCode"
        label:
          description: "Can be used to configure the layout of the generated label."
          $ref: "#/components/schemas/Label"
    ConfirmationMail:
      type: "object"
      required:
      - "sendTo"
      description: "Send a predefined message and configurable attachments (label,\
        \ parcelShopQrCode) via Email. Email will be translated into the selected\
        \ language (See `options.languageCode`)."
      properties:
        sendTo:
          type: "array"
          minimum: 1
          maximum: 1
          items:
            type: "string"
            format: "email"
            example: "invalid-email@address.com"
          description: "List of email addresses the label should be sent to."
        attachments:
          type: "object"
          properties:
            label:
              type: "object"
              description: "Return label (PDF, A4)"
              properties:
                include:
                  type: "boolean"
                  default: "true"
            parcelShopQrCode:
              type: "object"
              description: "Parcel-Shop-QR-Code (PNG, aspect ratio 6:7)<br>⚠Note that\
                \ this configuration is only allowed for relations that support Parcel-Shop-QR-Codes."
              properties:
                include:
                  type: "boolean"
                  default: "true"
    Label:
      type: "object"
      description: "Can be used to customize the visual appearance of the label.<br/>This\
        \ includes the layout and the consignee information.<br/>Please note, that\
        \ not all country relations support all customization options.<br/>Data of\
        \ this object will not be processed by our system any further."
      properties:
        layout:
          type: "string"
          enum:
          - "A4"
          - "A6"
          default: "A4"
        consignee:
          description: "✨ Preview feature"
          type: "object"
          required:
          - "info"
          properties:
            info:
              description: "Customization of the consignee info box."
              type: "object"
              required:
              - "type"
              - "args"
              properties:
                type:
                  type: "string"
                  enum:
                  - "code128"
                args:
                  required:
                  - "value"
                  type: "object"
                  properties:
                    value:
                      type: "string"
                      example: "123123123123"
                      pattern: "\\p{ASCII}+"
                      minLength: 1
                      maxLength: 25
                    line1:
                      type: "string"
                      example: "Ref: 123123123123"
                      pattern: "\\p{ASCII}+"
                      minLength: 0
                      maxLength: 25
                    line2:
                      type: "string"
                      example: ""
                      pattern: "\\p{ASCII}+"
                      minLength: 0
                      maxLength: 25
                    line3:
                      type: "string"
                      example: ""
                      pattern: "\\p{ASCII}+"
                      minLength: 0
                      maxLength: 25
                    line4:
                      example: ""
                      type: "string"
                      pattern: "\\p{ASCII}+"
                      minLength: 0
                      maxLength: 25
    Sender:
      type: "object"
      required:
      - "personName"
      - "address"
      properties:
        companyName:
          $ref: "#/components/schemas/SupportedCharacters"
        personName:
          $ref: "#/components/schemas/SupportedCharacters"
        email:
          description: "⚠ Required when sender country is `ES`, `FR`, `IT`, `SE`.<br/>"
          type: "string"
          format: "email"
        address:
          $ref: "#/components/schemas/Address"
    Receiver:
      type: "object"
      required:
      - "companyName"
      - "address"
      properties:
        companyName:
          $ref: "#/components/schemas/SupportedCharacters"
        personName:
          $ref: "#/components/schemas/SupportedCharacters"
        address:
          $ref: "#/components/schemas/Address"
    SupportedCharacters:
      type: "string"
      format: "First 256 characters in the unicode table. Greek uppercase: Between\
        \ Α and Ω. Greek lowercase: Between α and ω. Others: Ą, ą, Ă, ă, Ć, ć, Č,\
        \ č, Ď, ď, Ď, Đ, đ, Ě, ě, Ę, ę, Ĺ, ĺ, Ł, Ľ, ľ, ł, Ń, ń, Ň, ň, Ő, ő, Ř, ř,\
        \ Ŕ, ŕ, Ş, ş, Š, š, Ś, ś, Ţ, ţ, Ť, ť, Ů, ů, Ű, ű, Ź, ź, Ż, ż, Ž, ž. Please\
        \ note, that the | and line breaks are disallowed."
      minLength: 1
      maxLength: 40
    Address:
      type: "object"
      required:
      - "street"
      - "zipCode"
      - "city"
      - "countryCode"
      properties:
        street:
          $ref: "#/components/schemas/SupportedCharacters"
        city:
          $ref: "#/components/schemas/SupportedCharacters"
        zipCode:
          type: "string"
          minLength: 3
          maxLength: 10
          description: "Postal Code"
        countryCode:
          type: "string"
          example: "DE"
          minLength: 2
          maxLength: 2
          description: "Available return countries as defined in the description above.\
            \ Capital letters required."
    Parcel:
      type: "object"
      description: "Parcel information."
      properties:
        weight:
          type: "number"
          description: "The parcel weight in kg.<br>If not provided, the default value\
            \ of 1.5 will be applied."
          minimum: 0.01
          default: 1.5
    LabelFormat:
      type: "string"
      default: "pdf"
      enum:
      - "pdf"
      - "zpl"
      - "png"
    LabelType:
      type: "string"
      default: "label"
      description: "Please note that the labelType `parcelshop-qrcode` is only supported\
        \ for AT, BE, DE, DK, LU"
      enum:
      - "label"
      - "parcelshop-qrcode"
    LabelDpi:
      type: "number"
      description: "Resolution number of dots per inch of the final label.<br>Can\
        \ only be applied on PNG and ZPL output formats."
      default: 203
      enum:
      - 152
      - 203
      - 300
    References:
      description: "Map of order/parcel references"
      type: "object"
      properties:
        trackId:
          type: "string"
        parcelId:
          type: "string"
          description: "GLS 12 digit parcel Id."
    nationalReferences:
      description: "Map of order/parcel references. Please note, that this object\
        \ might be null for some relations."
      type: "object"
      properties:
        colloId:
          type: "string"
          description: "Reference Id for Italian national returns."
          example: "500000000000004GLS"
    ErrorResponseBody:
      description: "An individual error item, that can be listed"
      type: "object"
      properties:
        type:
          type: "string"
          description: "Machine-readable error type."
          example: "400-UNKNOWN-KEY"
        fieldName:
          type: "string"
          description: "Name of field where error occured."
          example: "layout"
        fieldValue:
          type: "string"
          description: "Field value where error occured."
          example: "XYZ"
        message:
          type: "string"
          description: "The error message"
          example: "must be one of [A4, A6]"
        documentationUrl:
          type: "string"
          description: "Link to further help on the error."
          example: "https://dev-portal.gls-group.net/error-codes"
    AdditionalReferences:
      type: "object"
      description: "Optional field for configuring additional references"
      properties:
        broker:
          type: "string"
          description: "Broker reference"
          minLength: 1
          maxLength: 40
          example: "#BROKER123456#"
        nationalContactId:
          type: "string"
          description: "Contact Id for the national label. Please note that currently\
            \ it is enabled only for `FR`"
          minLength: 1
          maxLength: 10
          example: "111aaagZ0A"
  securitySchemes:
    OAuthSandbox:
      description: "The shop-returns API uses OAuth 2 with the client credentials\
        \ flow. Use your apps credentials to receive the token."
      type: "oauth2"
      flows:
        clientCredentials:
          tokenUrl: "https://api-sandbox.gls-group.net/oauth2/v2/token"
          scopes: {}
security:
- OAuthSandbox: []
