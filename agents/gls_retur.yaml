info:
  version: "3.8.1"
  title: "Shop Returns Customer Plus API v3"
  description: "<u>__**Important**__:</u> Please follow the ''Getting Started'' Guide!<br><br>**Please\
    \ Note**: The ShopReturnService can currently be used by GLS customers in:<br><br>\
    \ **AT**, **BE**, **BG**, **CH**, **CZ**, **DE**, **DK**, **EE**, **ES**, **FI**,\
    \ **FR**, **GB**, **GR**, **HR**, **HU**, **IE**, **IT**, **LT**, **LU**, **LV**,\
    \ **NL**, **NO**, **PL**, **PT**, **RO**, **RS**, **SE**, **SI** and **SK**. (GLS\
    \ customers can have addresses in **CN**, **CA**, **CY**, **MT**, **HK**, **SG**,\
    \ **US**)<br><br>GLS customers in the countries mentioned above can generate return\
    \ labels from the following countries:<ul><li>Austria **(AT)**</li><li>Belgium\
    \ **(BE)**</li><li>Bulgaria **(BG)**</li><li>Czech Republic **(CZ)**</li><li>Croatia\
    \ **(HR)**</li><li>Denmark **(DK)**</li><li>Estonia **(EE)**</li><li>Finland **(FI)**</li><li>France\
    \ **(FR)**</li><li>Greece **(GR)**</li><li>Germany **(DE)**</li><li>Hungary **(HU)**</li><li>Ireland\
    \ **(IE)**</li><li>Italy **(IT)**</li><li>Latvia **(LV)**</li><li>Lithuania **(LT)**</li><li>Luxembourg\
    \ **(LU)**</li><li>Netherlands **(NL)**</li><li>Portugal **(PT)**</li><li>Poland\
    \ **(PL)**</li><li>Romania **(RO)**</li><li>Slovenia **(SI)**</li><li>Slovakia\
    \ **(SK)**</li><li>Spain **(ES)**</li><li>Sweden **(SE)**</li><li>Switzerland\
    \ **(CH)** - only CH domestic</li><li>United Kingdom **(GB)** - only GB domestic</ul><h1>Getting\
    \ Started</h1><ol><li>Create an app to receive your client credentials.</li><li>Try\
    \ out the API in sandbox mode. For that, add the <b>Authentication API v2</b>\
    \ and <b>Shop Returns Sandbox API v3</b> APIs to your app.</li><li>Use _sandbox_\
    \ as app-id to create a new Return Order. In production you would use your app-id.<br>**PLEASE\
    \ NOTE**: Do not use production data on a sandbox environment.</li><li>To get\
    \ production access please request the respective API(s) via the developer portal.\
    \ Then get in touch with your GLS sales contact and include your app id in the\
    \ communication.<br>In case you do not have a GLS sales contact yet, please get\
    \ in touch with GLS International Product Management (international-product-management@gls-group.com),\
    \ they will provide all the necessary information you need to move forward.</li></ol><br/>If\
    \ you have questions regarding technical issues, please contact your regular support\
    \ contact.<h2>Limitations of sandbox:</h2><h3>Please note that in our sandbox\
    \ environment it is possible to create returns for all available countries. This\
    \ may of course differ from the production environment, as we only enable the\
    \ countries, that you have contractually agreed with your GLS contact person.</h3><ul><li>The\
    \ labels created are invalid and cannot be used for shipping.</li><li>Return Orders\
    \ (including labels) are removed overnight.</li><li>Confirmation mails are not\
    \ sent.</li></ul><h2>Preview features</h2>Features annotated with ✨ are so called\
    \ _preview features_. These are new features that could still change in their\
    \ API or their implementation. Based on your feedback they are planned to become\
    \ _regular features_ eventually.<br/><h1>Changelog</h1><h2>3.8.1</h2><ul><li>Label-less\
    \ Drop-Off Feature: (Currently for sender countries `HU`, `PL`)</li></ul><h2>3.8.0</h2><ul><li>New\
    \ carrier in Sweden: **DB Schenker**. `sender.email` is now required for senders\
    \ from `SE`</li></ul><h2>3.7.0</h2><ul><li>ParcelShop QR-Code Feature: POST endpoints\
    \ now also accept `parcelshop-qrcode` parameter (Currently for sender countries\
    \ `AT`, `BE`, `DE`, `DK`, `LU`, `HU`, `PL`)</li></ul><h2>3.6.0</h2><ul><li>Sandbox\
    \ now supports `CH`, `FI`, `GB`, `GR`, `SE`</li></ul><h2>3.5.0</h2><ul><li>New\
    \ country `Greece (GR)`</li><li>New language code `el` (Greek)</li><li>New optional\
    \ field `options.label.consignee` (Allows you to customize the visual appearance\
    \ of the Label) - ✨ This is a preview feature</li></ul><h2>3.4.0</h2><ul><li>New\
    \ response field `references.parcelId`</li></ul><h2>3.3.0</h2><ul><li>New optional\
    \ field `additionalReferences.broker`</li><li>`SE` now enabled as sender country</li></ul><h2>3.2.1</h2><ul><li>Specify\
    \ format and encoding for some fields (For example: `sender.email` must be a valid\
    \ email address, `originalOrderReference` must be ISO/IEC 8859-1 compliant)</li><li>Add\
    \ more details to some field descriptions</li></ul><h2>3.2.0</h2><ul><li>New optional\
    \ field `sender.email` (required for sender countries `ES`, `FR`, `IT`)</li></ul><h2>3.1.0</h2><ul><li>ParcelShop\
    \ QR-Code Feature: GET endpoints now also accept `parcelshop-qrcode` parameter\
    \ (Currently for sender countries `AT`, `BE`, `DE`, `DK`, `LU`).</li><li>Allow\
    \ configuration of  attachments in confirmation mail (`options.confirmationMail.attachments`).</li></ul><hr/><h3>Corporate\
    \ information</h3>General Logistics Systems Germany GmbH & Co. OHG GLS Germany-Straß\
    e 1 - 7 36286 Neuenstein Germany +49(0)6677646907000 service@gls-germany.com Authorised\
    \ representatives: Personally liable participators: GLS Beteiligungs GmbH, represented\
    \ by Saadi Al-Soudani, Dr. Karl Pfaff, Dr. Achim Dünnwald General Logistics Systems\
    \ B.V., represented by Dr. Karl Pfaff Commercial Register No: Local Court Bad\
    \ Hersfeld HRA 863 Sales Tax ID No: Sales tax identification-No. DE 812802911\
    \ Information on Online Dispute Resolution for consumers: The EU commission has\
    \ set up an online platform for the online-resolution of disputes (\"ODR-platform\"\
    ). This platform serves as a contact point for extrajudicial resolutions of disputes\
    \ concerning contractual obligations, arising from online sales or services agreements.\
    \ Customers can reach the ODR-platform under the following link. General obligation\
    \ to provide information under Section 36 of the German Act on Alternative Dispute\
    \ Resolution in Consumer Matters (VSBG) Senders who contractually make use of\
    \ postal services of GLS Germany under generally accessible conditions with regard\
    \ to prices and services (e.g. via GLS ParcelShops, GLS-ONE and GLS App) and their\
    \ recipients, may call upon the regulatory authority as conciliation body for\
    \ the settlement of disputes with GLS Germany concerning rights and obligations\
    \ in the event of loss, theft or damage to postal items or the infringement of\
    \ their own rights to which they are entitled on the basis of a statutory ordinance\
    \ under Section 18 of the German Postal Act, if dispute settlement with GLS Germany\
    \ has previously been unsuccessful. If a consumer calls the conciliation body,\
    \ GLS Germany is obliged to take part in the dispute resolution procedure. Beyond\
    \ that, GLS Germany does not to take part in dispute resolution procedures before\
    \ a consumer conciliation body. Competent consumer conciliation body: Bundesnetzagentur\
    \ für Elektrizität, Gas, Telekommunikation, Post und Eisenbahnen Schlichtungsstelle\
    \ Post Tulpenfeld 4 53113 Bonn Internet: www.bundesnetzagentur.de To the extent\
    \ participation is mandatory, GLS Germany will take part in a dispute resolution\
    \ procedure before this consumer conciliation body."
