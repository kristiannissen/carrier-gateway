                     - This is always a License-Plate identifier assigned to the transportation unit, which contains multiple pieces. 
                     - If the label is requested via this API then this value should be left empty.
                  example: 'parcelIdentifier of type ASC MH10 - 2JJD0000000000000001. condition: must be provided if no label is requested'
                  maxLength: 50
                timestamp:
