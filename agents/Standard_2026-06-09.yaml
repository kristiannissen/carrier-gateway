    aggregateRequest:
      type: object
      properties:
        dataElement:
          type: object
          description: Container for the request data
          properties:
            labelDetails:
              type: object
              description: >
                          Label generation controls. If omitted, default behavior = true applies.
              properties:
                label:
                  type: boolean
                  description: >
                                 Label generation is required or not. Self-labeler actively must set ""false"", else per default a label and shipmentId will be issued via eConnect.
                  example: >
                             Labels are returned in following resolution per format:
                             - pdf: n/a as pdf is scalable
                             - zpl: 203 dpi resolution
                  enum:
                     - true
                     - false
                formatLabel:
                  type: string
                  enum:
                     - pdf
                     - zpl
                  description: If nothing is provided and label is to be generated:- default value ""pdf""
            general:
              type: object
              properties:
                product:
                  type: string
                shipmentId:
                  type: string
                  description: >
                              This describes the identifier that is used for parcel tracking.
                  minLength: 1
                  maxLength: 50
                timestamp:
                  type: string
                  format: date-time
                  description: >
                              Timestamp at which the request data is passed to DHL eConnect API.
                  enum:
                   - YYYY-MM-DDThh:mm:ssZ (or)
                   - YYYY-MM-DDThh:mm:ss+hh:mm (or)
                   - YYYY-MM-DDThh:mm:ss-hh:mm
                customerId:
                  type: string
                  description: Individual customer ID of sender. Will be provided to customers during onboarding process.
                  minLength: 1
                  maxLength: 35
              required:
               - timestamp
               - product
               - customerId
            aggregate:
              type: object
              description: Aggregation details (AWB, batch, cLoadlist)
              properties:
                scenario:
                  type: string
                  enum: [AWB, batch, cLoadlist]
                start:
                  type: object
                  description: Container for the shipment start details.
                  properties:
                    addressType:
                      type: string
                      enum: [default]
                    name:
                      type: string
                      maxLength: 50
                      description: This is the main field for describing the name. It must contain the full name.
                    street:
                      type: string
                      maxLength: 100
                      description: This field must contain the street name of the start address. Optionally also the housenumber, if not contained in streetNr.
                    streetNr:
                      type: string
                      maxLength: 10
                      description: If the house number is not part of street, this field can be used.
                    postcode:
                      type: string
                      maxLength: 17
                      description: The postcode/zipcode of the start of the shipment.
                    city:
                      type: string
                      maxLength: 35
                      description: City name of the start's address
                    region:
                      type: string
                      maxLength: 35
                      description: Start country's region code.  
                    country:
                      type: string
                      description: ISO-3166 two-letter country code; format:- capital letters
                      minLength: 2
                      maxLength: 2
                  required:
                   - name
                   - street
                   - postcode
                   - city
                   - country
                end:
                  type: object
                  description: Container for the shipment end details.
                  properties:
                    addressType:
                      type: string
                      enum: [depot, sortingCenter]
                    name:
                      type: string
                      maxLength: 50
                      description: This is the main field for describing the name. It must contain the full name.
                    street:
                      type: string
                      maxLength: 100
                      description: This field must contain the street name of the end address. Optionally also the housenumber, if not contained in streetNr.
                    streetNr:
                      type: string
                      maxLength: 10
                      description: If the house number is not part of street, this field can be used.
                    postcode:
                      type: string
                      maxLength: 17
                      description: The postcode/zipcode of the end of the shipment.
                    city:
                      type: string
                      maxLength: 35
                      description: City name of the end's address
                    region:
                      type: string
                      maxLength: 35
                      description: End country's region code.  
                    country:
                      type: string
                      description: ISO-3166 two-letter country code; format:- capital letters
                      minLength: 2
                      maxLength: 2
                  required:
                   - name
                   - street
                   - postcode
                   - city
                   - country
                physical:
                  type: object
                  properties:
                    grossWeight:
                      type: number
                      format: float
                      description: Gross weight of the shipment in kilogram (kg). format - nn.nnn (in kg)
                  required:
                   - grossWeight
                additionalInformation:
                  type: object
                  properties:
                    information:
                      type: array
                      items:
                        type: object
                        required: [type]
                        properties:
                          type:
                            type: string
                            enum: [start, end]
                          referenceNr:
                            type: string
                  required:
                   - information
                relations:
                  type: object
                  properties:
                    hierarchy:
                      type: object
                      properties:
                        reference:
                          type: array
                          items:
                            type: object
                            properties:
                              referenceName:
                                type: string
                                enum: [connect.light.mail, connect.light.parcel]
                              referenceId:
                                type: array
                                description: Array of piece identifiers included in the aggregated shipment.
                      required:
                       - reference
                containerList:
                  type: object
                  properties:
                    container:
                      type: array
                      items:
                        type: object
                        properties:
                          containerId:
                            type: string
                          physical:
                            type: object
                            properties:
                              grossWeight:
                                type: number
                                description: Required if provided for any container
                            required:
                             - grossWeight
                          relations:
                            type: object
                            properties:
                              hierarchy:
                                type: object
                                properties:
                                  reference:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        index:
                                          type: integer
                                        total:
                                          type: integer
                                      required:
                                       - total
                                required:
                                 - reference
                  required:
                   - container
              required:
               - scenario
               - physical
          required:
           - general
           - aggregate
      required:
       - dataElement
