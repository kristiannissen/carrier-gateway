              type: string
              description: UUID as a reference for the specific transaction
              example: 752328d4-2630-4a48-ac2b-a03b21b4de10
            statusCode:
              type: string
              description: >-
                     DHL status classification:OK: message was accepted and processed successfully ERROR: message processing is rejected and no shipment is created (see further information in statusMessage) WARNING: the message is accepted, but the customer is advised to take further action (see further information is statusMessage)  
              example: OK or ERROR
            statusMessage:
              type: string
              description: Specific status message. E.g. in case of internal business logic validations being failed specific rejection information will be handed back here
