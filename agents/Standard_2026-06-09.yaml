openapi: 3.0.0
info:
  version: 1.1.55
  title: Global API
  description: |-
    Our DHL eCommerce Europe API - eConnect provides you an interface to send shipment data and retrieve labels. In addition to that customs information and event data can be send as well as label be reprinted if this services was activated. Please find instruction below. 
     ### Changelog

    Disclaimer: This changelog is intended to give a summary of major changes
    between API versions only. For full details of all changes compared to a
    previous version, please always refer to the API description in its
    entirety.

    - **1.1.55**
      - adding endpoint Send aggregate
      - adding product Connect Light Mail
    - **1.1.54**
      - adding endpoint/product Connect Light Goods
      - updating cCustoms according to EU to IE flow
      - updating cEvent to allow 3PL sending events
      - Courier PickUp removed from Beta phase
      - adding Labelless QR-/Barcodes to Label Reprint function
      - sunsetting "customsdocscount" for Parcel International response
      - updating naming and description in multiple schemas

servers:
  - url: 'https://api-sandbox.dhl.com'
paths:
  /ccc/v1/auth/accesstoken:
    get:
      summary: Get Access Token
      description: |+
        The API provides OAuth 2.0 Access Token with various authorization scopes.

        The Get Access Token API call provides OAuth 2.0 Bearer token with authorization scope, assigned to your client id, which will grants you an access to the DHL eCommerce Europe API - eConnect.

        The API operation is secured by HTTP Basic authentication, therefore you have to provide **client_id** and **client_secret** as a username and password, when calling the API.
      parameters: []
      tags:
        - Get Access Token
      responses:
         '200':
          $ref: '#/components/responses/200_AccessToken'
         '401':
          $ref: '#/components/responses/401_AccessTokenUnauthorized'  
  /ccc/send-cpan:
    post:
      security:
        - OAuth2: []
      summary: Send shipment data and receive labels
      description: |+
        Purpose of this service is to send shipment data (cPAN) to the eConnect API and receive shipment labels in response, as per the requested file format and resolution. For supported services and features please refer to the <b>[Get Started](https://developer.dhl.com/api-reference/ecommerce-europe#get-started-section)</b> section of this developer website. 

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Status Code|Description|
         |---|---|--------|
         |200|200|cPAN processed|
         |200|603|Request validation errors|
         |401||Unauthorized|
         |429||Too many requests, try again later| 
         |500||Internal Server error, contact support|
         |503||Service Unavailable|
      parameters: []
      requestBody:
        description: cPAN details defined in JSON schema. Please choose the required use case for respective example value
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cPANRequest'
            examples:
              ParcelConnectDoorstep:
                $ref: '#/components/examples/PC_Doorstep'
              ParcelConnectDoorstepAllFeatures:
                $ref: '#/components/examples/PC_Doorstep_allFeatures'
              ParcelConnectDoorstepNoLabel:
                $ref: '#/components/examples/PC_Doorstep_NoLabel'
              ParcelConnectServicePoint:
                $ref: '#/components/examples/PC_Accesspoint'
              ParcelConnectLocker:
                $ref: '#/components/examples/PC_Locker_DE'
              ReturnNetwork:
                $ref: '#/components/examples/RN_Doorstep'
              ReturnNetworkDoorstepAllFeatures:
                $ref: '#/components/examples/RN_Doorstep_allFeatures'
              ReturnNetworkNoLabel:
                $ref: '#/components/examples/RN_Doostep_noLabel'
              ReturnNetworkLocationId:
                $ref: '#/components/examples/RN_Doostep_loationID'
              ParcelInternational:
                $ref: '#/components/examples/PI_Doorstep'   
              ReturnInternational:
                $ref: '#/components/examples/RI_Doorstep'
      tags:
        - Send cPAN
      responses:
        '200':
          $ref: '#/components/responses/200_cPAN'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
        '503':
          $ref: '#/components/responses/503_ServiceUnavailable'
  /econnect/light:
    post:
      security:
        - OAuth2: []
      summary: Send Connect Light data and receive labels
      description: |+
        <strong>The product = connect.light.mail is not operational released, the documentation is onlay as reference for technical integration and testing.</strong>
        Purpose of this service is to send shipment data (cPAN) for the product DHL Connect Light to the eConnect API and receive shipment labels in response, as per the requested file format and resolution. For supported services and features please refer to the <b>[Get Started](https://developer.dhl.com/api-reference/ecommerce-europe#get-started-section)</b> section of this developer website. 

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Status Code|Description|
         |---|---|--------|
         |200|200|CPAN processed|
         |200|603|Request validation errors|
         |401||Unauthorized|
         |429||Too many requests, try again later| 
         |500||Internal Server error, contact support|
         |503||Service Unavailable|
      parameters: []
      requestBody:
        description: Connect Light details defined in JSON schema.
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cLightRequest'
            examples:
              ConnectLightNoCustoms:
                $ref: '#/components/examples/CL_Doorstep_NoCustoms'
              ConnectLightCustoms:
                $ref: '#/components/examples/CL_Doorstep_Customs'
              ConnectLightNoLabel:
                $ref: '#/components/examples/CL_Doorstep_NoLabel'
              ConnectLightMail:
                $ref: '#/components/examples/CL_Doorstep_Mail'
      tags:
        - Send connectLight
      responses:
        '200':
          $ref: '#/components/responses/200_cLight'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
        '503':
          $ref: '#/components/responses/503_ServiceUnavailable'
  /econnect/aggregate:
    post:
      security:
        - OAuth2: []
      summary: Send aggregation message and receive a label
      description: |+
        Purpose of this service is to aggregate  shipment data for the product DHL Connect Light to the eConnect API and receive a label in response, as per the requested file format and resolution. For supported services and features please refer to the <b>[Get Started](https://developer.dhl.com/api-reference/ecommerce-europe#get-started-section)</b> section of this developer website. 

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Status Code|Description|
         |---|---|--------|
         |200|200|Aggregate processed|
         |401||Unauthorized|
         |429||Too many requests, try again later| 
         |500||Internal Server error, contact support|
         |503||Service Unavailable|
      parameters: []
      requestBody:
        description: Connect Light details defined in JSON schema.
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aggregateRequest'
            examples:
              aggregateEXP:
                $ref: '#/components/examples/aggregateEXP'
              aggregateEXP_onlyMail:
                $ref: '#/components/examples/aggregateEXP_onlyMail'
      tags:
        - Send aggregate
      responses:
        '200':
          $ref: '#/components/responses/200_aggregate'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
        '503':
          $ref: '#/components/responses/503_ServiceUnavailable'

  /ccc/send-cCustoms:
    post:
      security:
        - OAuth2: []
      summary: Send cCustoms data
      description: |  
        Purpose of this service is to send customs data (cCustoms) for shipments, that already have been created via the send cPAN request. Access restricted please contact DHL representative.

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Status Code|Description|
         |------------------|-------|--------------|
         |200|200|cCustoms processed|
         |200|618|cCustoms request validation errors|
         |401||Unauthorized|
         |429||Too many requests, try again later| 
         |500||Internal Server error, contact support|
      parameters:
        - name: generateCustomsDocument
          in: query
          description: CN23 Document generation is required or not. Default format is PDF. Please note:- a CN23 document is only returned for product parcelInternational, as it is not applicable to other products.
          required: false
          schema:
            enum:
              - 'true'
              - 'false'
            type: string
      requestBody:
        description: cCustoms details in defined JSON schema
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cCustomsRequest'
            examples:
             cCustomsParcelConnectEUtoIE:
                $ref: '#/components/examples/PC_Customs_EUtoIE'
             cCustomsParcelConnectEUtoIE_full:
                $ref: '#/components/examples/PC_Customs_EUtoIE_full'
             cCustomsPI:
                $ref: '#/components/examples/PI_Customs'
             cCustomsPI_Customs_full:
                $ref: '#/components/examples/PI_Customs_full'
             cCustomsParcelConnectGBtoEU:
                $ref: '#/components/examples/PC_Customs_EUtoGB'
             cCustomsParcelConnectEUtoGB:
                $ref: '#/components/examples/PC_Customs_GBtoEU'
      tags:
        - Send cCustoms
      responses:
        '200':
          $ref: '#/components/responses/200_cCustoms'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
  /ccc/createShipmentPlus:
    post:
      security:
        - OAuth2: []
      summary: Send shipment data for Connect Plus product and receive labels
      description: |+
        Purpose of this service is to send shipment data for the product DHL Connect PLUS to the eConnect API and receive shipment labels in response, as per the requested file format and resolution. For supported services and features please refer to the <b>[Get Started](https://developer.dhl.com/api-reference/ecommerce-europe#get-started-section)</b> section of this developer website.

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Status Code|Description|
         |---|---|--------|
         |200|200|CPAN processed|
         |200|603|Request validation errors|
         |401||Unauthorized|
         |429||Too many requests, try again later| 
         |500||Internal Server error, contact support|
         |503||Service Unavailable|
      parameters: []
      requestBody:
        description: connectPlus details defined in JSON schema. 
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cPlusRequest'
            examples:
              ConnectPlusLabel:
                $ref: '#/components/examples/CP_Doorstep'
              ConnectPlusNoLabel:
                $ref: '#/components/examples/CP_Doorstep_NoLabel'
              ConnectPlusLabelCustomerBarcode:
                $ref: '#/components/examples/CP_Doorstep_CustomerBarcode'
              ParcelEurope.connectPlus-LabelRequested Pallet:
                $ref: '#/components/examples/CP_Pallet_Doorstep'
      tags:
        - Send connectPlus
      responses:
        '200':
          $ref: '#/components/responses/200_cPlus'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
        '503':
          $ref: '#/components/responses/503_ServiceUnavailable'
  /ccc/send-cevent:
    post:
      security:
        - OAuth2: []
      summary: Send cEvent data
      description: |+
        Purpose of this service is to send event data (cEvent) for shipments, that already have been created via the send cPAN request. Customers can provide event activities that take place as pre- or post- processing of DHL activities. This event data will be relayed to respective DHL eCommerce network partners and also end recipients (e.g., via Track & Trace information). Access restricted please contact DHL representative.

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Status Code|Description|
         |---|---|--------|
         |200|200|cEvent processed|
         |200|603|Request validation errors|
         |401||Unauthorized|
         |429||Too many requests, try again later| 
         |500||Internal Server error, contact support|
      parameters: []
      requestBody:
        description: cEvent details defined in JSON schema.
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cEventRequest'
            examples:
              cEvent:
                $ref: '#/components/examples/cEvent'
              cEventallInfo:
                $ref: '#/components/examples/cEvent_allInfo'
      tags:
        - Send cEvent
      responses:
        '200':
          $ref: '#/components/responses/200_cEvent'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
        '503':
          $ref: '#/components/responses/503_ServiceUnavailable'
  /ccc/label-reprint:
    get:
      security:
        - OAuth2: []
      summary: Get the label reprinted based on the pieceId & customerId
      description: |+
        Purpose of this service is to get the label reprinted for the given pieceId & customerId. The benefit of this service is that it reprints the label. The label will be stored for maximum 10 days from the initial request and after that reprint not available any more. Customer needs to be authorized by project team to use this service.
        

         **System Response Codes**

         The System Response Codes are provided in the *status* filed of the response.

         |HTTP Code|Description|
         |---|------|
         |200| Request has been processed successfully|
         |401|Unauthorized or Request error|
         |429|Too many requests, try again later| 
         |500|Internal Server error, contact support|
      parameters:
        - name: pieceId
          in: query
          description: ShipmentId of the parcel
          required: true
          schema:
            default: ''
            type: string
        - name: customerId
          in: query
          description: Individual customer Identification
          required: true
          schema:
            default: ''
            type: string




      tags:
        - Label Reprint
      responses:
        '200':
          $ref: '#/components/responses/200_Reprint'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '429':
          $ref: '#/components/responses/429_TooManyRequests'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
  /ccc/courier-pickup:
    post:
      summary: Send Courier Pickup request
      description: |+
        The purpose of this service is to enable our business customers in France and Italy to order an adHoc courier pickup of their shipments. A DHL courier pickup can be requested for a specific date and within a desired time-slot.
        
        Pickup cancellations and modifications are possible via the customer service hotlines but not via this service.
        
        Access restricted please contact DHL representative.
        
        **System Response Codes**

         The System Response Codes are provided in the *statusCode* field of the response.

         |Code|Description|
         |------------------|--------------|
         |201|Success|
         |400|Bad request|
         |401|Unauthorized request|
         |500|Internal Server Error|
      parameters: []
      requestBody:
        description: Pickup details defined in JSON schema.
        required: true
        content:
          application/json:
            schema:
                    $ref: '#/components/schemas/PickUpRequest'
            examples:
              CourierPickupRequest:
                $ref: '#/components/examples/PickUp'
      tags:
        - Courier Pickup in Italy and France
      responses:
        '201':
          $ref: '#/components/responses/201_PickUp'
        '400':
          $ref: '#/components/responses/400_PickUp'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '500':
          $ref: '#/components/responses/500_InternalServerError'
components:
  schemas:
    cPANRequest:
      type: object
      properties:
        dataElement:
          type: object
          description: 'Container for the request data'
          properties:
            parcelOriginOrganization:
              type: string
              description: This field indicates the origin country of the parcel. ISO-3166 two-letter country code (capital lettters); format:- capital letters.
              example: NL
              maxLength: 2
            parcelDestinationOrganization:
              type: string
              description: This indicates which country is the recipient of the parcel. ISO-3166 two-letter country code(capital lettters); format:- capital letters.
              example: PL
              maxLength: 2
            labelDetails:
              type: object
              description: >
                             Label generation controls. If omitted, default behavior applies.
                             - If `label = true` (default behavior), DHL generates a label and parcelId.
                             - If `label = false` (self-labeler), you MUST provide `general/parcelIdentifier` and `general/routingCode`.
                             Note: When `formatLabel = zpl-native`, label content is returned as plain ZPL string (not base64).
              properties:
                label:
                  type: boolean
                  description: >
                                 Label generation is required or not. Self-labeler actively must set "false", else per default a label and pacelId will be issued via eConnect.
                  example: >
                             Labels are returned in following resolution per format:
                             - pdf: n/a as pdf is scalable
                             - png: 300 dpi resolution
                             - zpl: 300 dpi resolution
                             - zpl-native: 203 dpi resolution
                  enum:
                     - true
                     - false
                formatLabel:
                  type: string
                  enum:
                     - pdf
                     - png
                     - zpl
                     - zpl-native
                  description: If nothing is provided and label is to be generated:- default value "pdf"
                size:
                  type: string
                  enum:
                     - 10x15
                     - 10x21
                  description:
                       Only applicable to label. Size is expressed in cm. If nothing is provided and label is to be generated:- default value "10x15" (cm)
                qrCode:
                  type: boolean
                  description: qrCode generation is required or not.
                   Note:- qrCode can be requested only in case of product return.network and allowed country scenarios, where qrCodes are as well supported.
                  example: qrCodes are returned in 256 dpi resolution
                  enum:
                     - true
                     - false
                formatQrCode:
                  type: string
                  enum:
                     - png
                     - gif
                  description: If nothing is provided and qrCode is to be generated:- default value "png"
            general:
              type: object
              properties:
                parcelIdentifier:
                  type: string
                  description: This describes the identifier that is used for parcel tracking. 
                    Product DHL Parcel Connect/Return Connect
                      - This is always a License-Plate identifier. 
                      - If the label is requested via this API then this value should be left empty. 
                    Product DHL Parcel International
                      - This is always a UPU S10 identifier. 
                      - If the label is requested via this API then this value should be left empty.
                    Product DHL Parcel Return International
                      - not applicable, as lable and parcel identifier are  always provided.
                    Must be provided if label is not requested.
                  example: Example of parcelIdentifier of type ASC MH10 "JJD0000000000000001"
                timestamp:
                  type: string
                  description: Timestamp at which the request data is passed to DHL eCS Europe API.
                  example: Example of expressing the same time in the different formats-
                       2022-07-01T13:05:05Z
                       2022-07-01T15:05:05+02:00
                       2022-07-01T11:05:05-02:00
                  enum: 
                     - YYYY-MM-DDThh:mm:ssZ (or) 
                     - YYYY-MM-DDThh:mm:ss+hh:mm (or) 
                     - YYYY-MM-DDThh:mm:ss-hh:mm
                product:
                  type: string
                  description: This is the product of the parcel.
                     Please use-
                         - ParcelEurope.parcelconnect for product "DHL Parcel Connect"
                         - ParcelEurope.return.network for product "DHL Parcel Return Connect"
                         - ParcelEurope.parcelinternational for product "DHL Parcel International"
                         - ParcelEurope.return.international for product "DHL Parcel International Return"
                  enum: 
                     - ParcelEurope.parcelconnect 
                     - ParcelEurope.return.network 
                     - ParcelEurope.parcelinternational
                     - ParcelEurope.return.international
                routingCode:
                  type: string
                  description: This describes the identifier used for routing the parcel. It contains information about the data/ application identifier type used, recipient information and service information. Must only provided when the label is not requested, but generated by the customer. Not relevant for DHL Parcel Return International.   
                    Must be provided if label is not requested.
                  example: Example of the identifier type ASC MH10- 2LIT20123+70530000
              required:
                - timestamp
                - product
            cPAN:
              type: object
              description: Container for the parcel sender, receiver and parcel feature details.
              properties:
                addresses:
                  type: object
                  description: Container for the parcel sender and receiver details. Addresses where the parcel is coming from and destined to.
                  properties:
                    sender:
                      type: array
                      description: Container for the parcel sender details. In case parcels are undeliverable, they will be send back to this address.
                      items:
                       properties:
                        type:
                          type: string
                          description: Type of the sender address.There must be one sender with address type "default". 
                          example: default
                          enum:
                              - default                          
                        firstName:
                          type: string
                          maxLength: 35
                          description: If first name is available, fill in this field. Content can also be put into 'name' field.
                        name:
                          type: string
                          maxLength: 35
                          description: This is the main field for describing the name. It must contain the surname, optionally also the first name.
                        additionalName:
                          type: string
                          maxLength: 35
                          description: If further name field is required, use this field.
                        mobileNr:
                          type: string
                          maxLength: 35
                          description: Sender's phone number, used for SMS notification.
                        phoneNr:
                          type: string
                          maxLength: 35
                          description: Sender's phone number
                        email:
                          type: string
                          maxLength: 70
                          description: Sender's email address, used for mail notification. Must contain the "@" character
                        street1:
                          type: string
                          maxLength: 35
                          description: This field must contain the street name of the sender address. Optionally also the housenumber, if not contained in street1Nr.
                        street1Nr:
                          type: string
                          maxLength: 10
                          description: If the house number is not part of Street1, this field can be used. Conditional:Must be provided if product= ParcelEurope.return.international
                        street2:
                          type: string
                          maxLength: 35
                          description: Alternative street name of the sender address. Optionally also the house number.
                        street2Nr:
                          type: string
                          maxLength: 10
                          description: If the house number is not part of Street2, this field can be used.
                        postcode:
                          type: string
                          maxLength: 17
                          description: The postcode/zipcode of the sender of the parcel.
                        city:
                          type: string
                          maxLength: 35
                          description: City name of the sender's address
                        region:
                          type: string
                          maxLength: 35
                          description: sender country's region code.  
                        country:
                          type: string
                          description: ISO-3166 two-letter country code; format:- capital letters
                          maxLength: 2
                          example: NL
                        referenceNr:
                          type: string
                          description: Customer-specific reference number, which will also appear on the label.
                        customerIdentification:
                          type: string
                          maxLength: 35
                          description: Individual customer ID of sender. Will be provided to customers during onboarding process.
                        customerAccountNr1:
                          type: string
                          maxLength: 35
                          description: Additional account information. Will be provided to customers during onboarding process, if applicable to the customer scenario.Conditional:You either need to send a customerAccountNr1 or need to be pre-configured in eConnect. Please reach out to your DHL contact person.  
                       required:
                         - type
                         - name
                         - street1
                         - postcode
                         - city
                         - country
                         - customerIdentification
                    recipient:
                      type: array
                      maxItems: 2
                      description: Container for the parcel recipient details. The parcel will be shipped to this address.
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            description: Type of the recipient address. 
                                Product DHL Parcel Connect - 
                                 - Type of recipient address can be doorstep and accesspoint.
                                Product DHL Parcel Return Connect -
                                 - Type of recipient address is always  doorstep.
                                Product DHL Parcel International/Return International - 
                                 - Type of recipient address is always doorstep.
                            enum: 
                              - doorstep
                              - accesspoint
                                             
                                          
                          firstName:
                            type: string
                            maxLength: 35
                            description: If first name is available, fill in this field. Content can also be put into name field.
                          name:
                            type: string
                            maxLength: 35
                            description: This is the main field for describing the name. It must contain the surname, optionally also the first name.
                            example:
                          additionalName:
                            type: string
                            maxLength: 35
                            description: If a further name field is required, use this field.
                            example:
                          mobileNr:
                            type: string
                            maxLength: 35
                            description: Recipient mobile number, used for SMS notification in some scenarios (e.g. service point delivery).
                            example:
                          phoneNr:
                            type: string
                            maxLength: 35
                            description: Recipient fixed line phone number.
                            example:
                          email:
                            type: string
                            maxLength: 70
                            description: Recipient email address, used for email notification. Must contain the "@" character. Mandatory, if addressed to an access point.
                            example:
                          street1:
                            type: string
                            maxLength: 35
                            description: This field must contain the street name of the sender address. Optionally also the housenumber, if not contained in street1Nr. 
                              Note - in case of direct addressing to service points the keyword has to be included here. (Source- LocationFinder)
                            example: Packstation
                          street1Nr:
                            type: string
                            maxLength: 10
                            description: If the housenumber is not part of Street1, this field can be used.
                              Note- in case of direct addressing to service points the keywordId has to be included here. (Source- LocationFinder)
                            example: 183
                          street2:
