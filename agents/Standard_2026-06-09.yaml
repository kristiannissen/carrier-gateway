    cLightRequest:
      type: object
      description: 'Container for the request data'
      properties:
       dataElement:
          type: object
          properties:
            labelDetails:
             type: object
             description: >
                            Label generation controls. If omitted, default behavior applies.
                            - If `label = true` (default behavior), DHL generates a label and parcelId.
                            - If `label = false` (self-labeler), you MUST provide `general/parcelIdentifier` and `general/routingCode`.
                            Note: When `formatLabel = zpl-native`, label content is returned as plain ZPL string (not base64).
             properties:
               label:
                type: boolean
                description: >
                              Label generation is required or not. Self-labeler actively must set "false", else per default a label and pacelId will be issued via eConnect.
                example: >
                           Labels are returned in following size and resolution per format:
                           - pdf: 10x15 size, n/a as pdf is scalable
                           - png: 10x15 size, 300 dpi resolution
                           - zpl-native: 10x15 size, 203 dpi resolution
                enum:
                   - true
                   - false
               formatLabel:
                type: string
                description: >
                             If nothing is provided and label is to be generated:- default value "pdf"
                enum:
                   - pdf
                   - png
                   - zpl-native
            general:
                   type: object
                   properties:
                    parcelIdentifier:
                        type: string
                        description: >
                                     This describes the identifier that is used for parcel tracking. If the label is requested via this API then this value should be left empty. For product = connect.light.parcel it is always a UPU S10 identifier. Must be provided if label is not requested
                        minLength: 1
                        maxLength: 50
                    timestamp:
                     type: string
                     format: date-time
                     description: >
                                   Timestamp at which the request data is passed to DHL eConnect API.
                     enum:
                      - YYYY-MM-DDThh:mm:ssZ (or)
                      - YYYY-MM-DDThh:mm:ss+hh:mm (or)
                      - YYYY-MM-DDThh:mm:ss-hh:mm
                    product:
                     type: string
                     description: This is the product of Connect Light
                     enum:
                        - connect.light.parcel
                        - connect.light.mail
                    routingCode:
                     type: string
                     description: >
                                 This describes the identifier used for routing the parcel. It contains information about the data/ application identifier type used, recipient information and service information. Must only provided when the label is not requested, but generated by the customer.
                     minLength: 1
                     maxLength: 50
                     example: 2LES28013+73000000
                    customerIdentification:
                     type: string
                     description: Individual customer ID of sender. Will be provided to customers during onboarding process.
                     minLength: 1
                     maxLength: 35
                    customerPricingReference:
                     type: string
                     description: Customer Pricing Reference number
                     minLength: 1
                     maxLength: 35
                   required:
                    - timestamp
                    - product
                    - customerIdentification
            cPAN-light:
             type: object
             description: Container for the parcel sender, receiver and parcel feature details.
             properties:
              addresses:
                type: object
                description: Container for the parcel sender and receiver details. Addresses where the parcel is coming from and destined to.
                properties:
                 sender:
                  type: object
                  description: Container for the sender details. In case of undeliverable, they will be send back to this address. The sender must either provided here or by configuration.
                  items:
                   properties:
                    type:
                     type: string
                     description: Type of the sender address.There must be one sender with address type "default".
                     enum:
                       - default
                    firstName:
                     type: string
                     maxLength: 35
                     description: If first name is available, fill in this field. Content can also be put into 'name' field.
                    name:
                     type: string
                     description: This is the main field for describing the name. It must contain the surname, optionally also the first name.
                     maxLength: 50
                    additionalName:
                     type: string
                     description: If further name field is required, use this field.
                     maxLength: 35
                    mobileNr:
                     type: string
                     description: Sender's phone number
                     maxLength: 35
                    phoneNr:
                     type: string
                     description: Sender's phone number
                     maxLength: 35
                    email:
                     type: string
                     format: email
                     maxLength: 70
                     description: Sender email (used for notifications).
                    street:
                     type: string
                     maxLength: 100
                     description: This field must contain the street name of the sender address. Optionally also the housenumber, if not contained in streetNr.
                    streetNr:
                     type: string
                     maxLength: 10
                     description: If the house number is not part of Street, this field can be used.
                    postcode:
                     type: string
                     description: The postcode/zipcode of the sender of the parcel.
                     maxLength: 17
                    city:
                     type: string
                     description: City name of the sender's address
                     maxLength: 35                    
                    country:
                     type: string
                     description: ISO-3166 two-letter country code; format:- capital letters
                     pattern: '^[A-Z]{2}$'
                     example: DE
                    region:
                     type: string
                     description: Region of the sender's address
                     maxLength: 35
                    referenceNr:
                     type: string
                     description: Customer-specific reference number, which will also appear on the label.
                     maxLength: 35
                   required:
                    - type
                    - name
                    - street
                    - postcode
                    - city
                    - country
                  minItems: 0
                  maxItems: 1
                 recipient:
                  type: object
                  description: Container for the receiver details. Not needed in case of product = connect.light.mail.
                  items:
                   properties:
                    type:
                     type: string
                     description: Type of the recipient address.
                     enum:
                       - doorstep
                    firstName:
                     type: string
                     description: If first name is available, fill in this field. Content can also be put into name field.
                     maxLength: 35
                    name:
                     type: string
                     description: This is the main field for describing the name. It must contain the surname, optionally also the first name.
                     maxLength: 50
                    additionalName:
                     type: string
                     description: If a further name field is required, use this field.
                     maxLength: 35
                    mobileNr:
                     type: string
                     description: Recipient mobile number
                     maxLength: 35
                    phoneNr:
                     type: string
                     description: Recipient fixed line phone number.
                     maxLength: 35
                    email:
                     type: string
                     format: email
                     maxLength: 70
                     description: Recipient email address
                    street:
                     type: string
                     maxLength: 100
                     description: This field must contain the street name of the sender address. Optionally also the housenumber, if not contained in streetNr.
                    streetNr:
                     type: string
                     description: If the housenumber is not part of Street, this field can be used.
                     maxLength: 10
                    postcode:
                     type: string
                     description: The postcode/zipcode of the recipient of the item.
                     maxLength: 17
                    city:
                     type: string
                     description: The name of the city of the recipient address for delivery.
                     maxLength: 35
                    region:
                     type: string
                     maxLength: 35
                     description: Region of the recipient's address.Must be provided when the destination is US.
                     example: NY
                    country:
                     type: string
                     description: ISO-3166 two-letter country code. format:- capital letters
                     pattern: '^[A-Z]{2}$'
                     example: GB
                    deliveryInstructions:
                     type: string
                     description: Delivery instructions for parcel
                     maxLength: 100        
                   required:
                    - type
                    - name
                    - street
                    - postcode
                    - city
                    - country
                  minItems: 0
                  maxItems: 1
              features:
                type: object
                description: Parcel service features and physical characteristics.
                properties:
                    simpleFeature:
                     type: string
                     description: Connect Light Goods can be sent tracked or untracked. Must be provided if product = connect.light.parcel.
                     enum:
                       - tracked
                       - untracked
                    destinationCountry:
                     type: string
                     description: ISO-3166 two-letter country code. format:- capital letters. Not needed in case of product =connect.light.parcel.
                     pattern: '^[A-Z]{2}$'
                     example: GB
                    mailCount:
                     type: number
                     description: Total amount of letters. Not needed in case of product = connect.light.parcel.
                     minimum: 1 
                    physical:
                     type: object
                     description: >
                                  Physical characteristics of the parcel. Provide either dimensions (`length`, `height`, `width`) **or** `format` (P/G/E), together with `grossWeight`.
                                   - Weight in kilograms (up to 3 fraction digits).
                                   - Dimensions in meters (up to 2 fraction digits).
                     properties:
                      grossWeight:
                       type: number
                       format: float
                       description: Gross weight of the parcel in kilogram (kg). format - nn.nnn (in kg). Optional for DHL Express customer. Value cannot be zero.
                       minimum: 0.001
                      length:
                       type: number
                       format: float
                       description: Length of the parcel in meter (m). format - nn.nn (in m). Value cannot be zero.
                       minimum: 0.01
                      height:
                       type: number
                       format: float
                       description: Height of the parcel in meter (m). format - nn.nn (in m). Value cannot be zero.
                       minimum: 0.01
                      width:
                       type: number
                       format: float
                       description: Width of the parcel in meter (m). format - nn.nn (in m). Value cannot be zero.
                       minimum: 0.01
                      format:
                       type: string
                       description: > 
                                    Size format alternative to dimensions. Optional in case of product = connect.light.parcel.
                                     Allowed values are 'P' , 'G' and 'E'.
                                       - P (petit/small) max weight 0.1kg,
                                       - G (grande/big) max weight 0.5kg,
                                       - E (encombrant/bulky) max weight 2.0kg.
                       enum:
                         - P
                         - G
                         - E
                     oneOf:
                      - required: [length, height, width]
                      - required: [format]
            customs:
             type: object
             description: Customs declaration details. Required when sender/recipient combination is customs-liable. Not needed in case of product = connect.light.mail.
             properties:
              customsIDs:
                type: object
                properties:
                 sender:
                  type: array
                  maxItems: 5          
                  description: > 
                               Container for the customsIDs for sender. Needs to be included only if customsID information for the sender shall be specified. Maximum of 5 sender IDs are allowed. If multiple IDs are to be provided, idType must be unique.
                  items:
                   properties:
                    idType:
                     type: string
                     description: Information on the type of fiscal ID.
                     enum:
                      - VAT
                      - EORI
                      - inboundVAT
                      - IOSS
                    identifier:
                     type: string
                     description: Fiscal ID of the sender
                     maxLength: 35
                   required:
                    - idType
                    - identifier
                 recipient:
                  type: array
                  maxItems: 5          
                  description: > 
                               Container for the customsIDs for recipient. Needs to be included only if customsID information for the recipient shall be specified. Maximum of 5 sender IDs are allowed. If multiple IDs are to be provided, idType must be unique
                  items:
                   properties:
                    idType:
                     type: string
                     description: Information on the type of fiscal ID.
                     enum:
                      - VAT
                      - EORI
                      - inboundVAT
                      - IOSS
                    identifier:
                     type: string
                     description: Fiscal ID of the recipient
                     maxLength: 35
                   required:
                    - idType
                    - identifier
              general:
                type: object
                description: Settings applying to all customs items.
                properties:
                 currency:
                  type: string
                  description: > 
                                Currency of of the shipping fee to recipient.Note: All monetary values must be provided in a single currency. Currency uses ISO 4217 alpha-3 currency codes.
                  pattern: '^[A-Z]{3}$'
                  example: EUR
                 totalValue:
                  type: number
                  format: float
                  description: >
                                Total value including all costs related to a shipment. Most not be below than the combined total of insurance cost, shippingFee, transportation cost and sum of all piece values. Value cannot be zero.
                  minimum: 0.01
                 shippingFee:
                  type: number
                  format: float
                  description: Transportation costs for the shipment.
                 insuranceCost:
                  type: number
                  format: float
                  description: Insurance cost for the shipment
                 incoterms:
                  type: string
                  description: Incoterm as agreed between sender and recipient. Allowed Incoterms are DAP or DDP.
                  enum:
                    - DAP
                    - DDP                
                 exportReason:
                  type: string
                  description: >
                                Indication for customs for the Export Reason. Allowed values- corresponding names of UPU list 136 (Note:- CommercialGoods = Sale of goods; reason 11). Also note that in various customs scenarios not all values are allowed check out the respective use case description (get started section and/ or reach out to your DHL contact to confirm the respective scenario allowed values)
                  enum:
                    - CommercialGoods
                    - CommercialSaleOfGoods
                    - Documents
                    - FreeUsage
                    - Gift
                    - GoodsForTesting
                    - MixedContent
                    - Other
                    - ProductSample
                    - RepairReturnGoods
                    - ReturnedItem
                    - UnwantedCommercialReturnGoods
                    - WarrantyReturnGoods
                required:
                 - currency
                 - incoterms
                 - exportReason
                 - totalValue
              item:
               type: array
               description: One or more customs line items.
               minItems: 1
               items:
                properties:
                 description:
                  type: string
                  description: Description of the goods.
                  example: DHL Toy Truck
                  maxLength: 35
                 marketPlaceURL:
                  type: string
                  description: Deeplink URL of item
                  example: 'https://www.example.com/item123'
                  maxLength: 1000
                 customsTariffNumber:
                  type: string
                  description: Tariff Code to describe the goods (usually as HS-code). Only numeric values are accepted.
                  example: 95030070
                  minLength: 6
                  maxLength: 10
                 originCountry:
                  type: string
                  description: Country of origin (manufacturer) of the item. ISO-3166 two-letter country code. Must be provided when the destination is US.
                  pattern: '^[A-Z]{2}$'
                  example: US
                 quantity:
                  type: integer
                  minimum: 1
                  description: Number of units of the item
                 netWeight:
                  type: number
                  format: float
                  description: Net weight per Item of the described type in Kg, format - xx.xxx ("." as separator, 3 decimals). Value cannot be zero.
                  minimum: 0.001
                 value:
                  type: number
                  format: float
                  description: Gross value (incl. VAT) per Item of the described type. Value cannot be zero.
                  minimum: 0.01
                 manufacturerId:
                   type: object
                   description: >
                               Manufacturer identification. Must be provided when the destination is US.
                   properties:
                    type:
                     type: string
                     maxLength: 35
                     description: Recommended to use for apparel/textile to US, Always "mid" for US import
                    id:
                     type: string
                     maxLength: 70
                     description: Manufacturer Id
                   required:
                    - type
                    - id
                required:
                 - description
                 - customsTariffNumber
                 - quantity
                 - netWeight
                 - value
              customDocuments:
               type: array
               description: documents
               items:
                properties:
                 docType:
                  type: string
                  description: Classification of the document. "INV" (for invoice)
                  enum:
                    - INV
                 identifier:
                  type: string
                  description: Identifier of the document. e.g. commercial invoice number as specified by the customer
                  example: 2022090512345
                  minLength: 1
                  maxLength: 35
                 name:
                  type: string
                  description: Filename of the encoded document.
                  example: invoice_test_example
                  minLength: 1
                  maxLength: 255
                 binary:
                  type: string
                  description: Base64-encoded electronic document. File type can be determined by its magic number.
                 issuedate:
                  type: string
                  description: Issue date of the document.
                  example: 2022-09-25
                 comment:
                  type: string
                  description: Additional information on the shipment to aid customs clearance processes
                  minLength: 1
                  maxLength: 512
             required:
               - general
               - item
          required:
           - general
           - cPAN-goods
      required:
       - dataElement
