  responses:
    200_AccessToken:
      description: 'Token generated successfully'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_AccessToken'
          example:
            access_token: '3AiFEwHpiJccsYLFOpdr8yYudBLP'
            token_type: 'Bearer'
            expires_in: 17999
    401_AccessTokenUnauthorized:
      description: Unauthorized. Provided key or token is invalid for requested resource.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemSchema'
          example:
            status: 401
            title: 'Unauthorized'
            detail: 'Unauthorized for given resource.'
    200_cPAN:
      description:  'The response will be 200 when CPAN processed successfully (statusCode = "OK") or  cPAN processing failed due to input data quality like incorrect Customer Identification (statusCode = "ERROR").'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_cPAN'
          examples:            
            cPAN_OK:
              $ref: '#/components/examples/200_cPANLabel'
            cPANQR_OK:
              $ref: '#/components/examples/200_cPANQR' 
            cPAN_ERROR:
              $ref: '#/components/examples/603_cPANERROR'
    200_cLight:
      description: >-
        The response will be 200 when Connect Light Parcel processed successfully (statusCode = "OK") or Connect Light Parcel processing failed due to input data quality like incorrect Customer Identification (statusCode = "ERROR").
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_cLight'
          examples:
            cPANLight_OK:
              $ref: '#/components/examples/200_cLight'
            cPANLight_ERROR:
              $ref: '#/components/examples/603_cLightERROR'
    200_cCustoms:
      description:  'cCustoms processed'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_cCustoms'
          examples:            
            cCustoms_OK:
              $ref: '#/components/examples/200_cCustoms'    
            cCustoms_ERROR:
              $ref: '#/components/examples/618_cCustomsERROR'
    200_cPlus:
      description:  'connectPlus(PAN) processed'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_cPlus'
          examples:            
            cPlus_OK:
              $ref: '#/components/examples/200_cPlus'
            cPlus_ERROR:
              $ref: '#/components/examples/603_cPlusERROR'
    200_cEvent:
      description:  'The response will be 200 when eEvent processed successfully (statusCode = "OK") or  cEvent processing failed due to input data quality like incorrect Customer Identification (statusCode = "ERROR").'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_cEvent'
          examples:            
            cPAN_OK:
              $ref: '#/components/examples/200_cEvent'        
            cPAN_ERROR:
              $ref: '#/components/examples/603_cEventERROR'
    200_Reprint:
      description: Label has been reprinted successfully based on peiceId & customerId
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/200_Reprint'
          examples:            
            OK:
              $ref: '#/components/examples/200_Reprint'        
            ERROR:
              $ref: '#/components/examples/401_ReprintERROR'
    201_PickUp:
      description: 'Pickup request processed successfully'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/201_PickUp'
          example:
              statusCode: '201'
              statusMessage: 'Pickup Created - dispatchConfirmationNumber : CBJ180121002626'
              customerId: '5012345678'
              sessionId: '1f66242a-a734-431d-931e-23c59a6013ef'
              timestamp: '2026-01-01T12:00:00Z'
              dispatchConfirmationNumbers: 'CBJ180121002626'
    400_PickUp:
      description: 'Bad Request'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/400_PickUp'
          example:
              statusCode: '400'
              statusMessage: 'Bad request, The pickup date cannot be in the past. Please check the pickup date and retry'
              customerId: '5012345678'
              sessionId: '48627db1-85b3-4c1a-82e3-b19acaa56c40'
              timestamp: '2026-01-01T12:00:00+02:00'
    400_BadRequest:
      description: 'Invalid Input - Unexpected input provided, incorrect json syntax.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/400_BadRequest'
          example:
           error:
            status: '602'
            timestamp: '2026-01-01T12:00:00'
            sessionId: '009dbb54-979c-4637-8281-e00bd6932e08'
            statusCode: ERROR
            statusMessage: 'Unexpected character (''{'' (code 123)): was expecting comma to separate Object entries at [line: 2, column: 23]'
    401_Unauthorized:
      description: Unauthorized. Provided key or token is invalid for requested resource.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemSchema'
          example:
            status: 401
            title: 'Unauthorized'
            detail: 'Unauthorized for given resource.'
    503_ServiceUnavailable:
      description: Service Unavailable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemSchema'
          example:
            reasons:
            - msg: Service Unavailable
            details:
              msgId: Id-836a775dc794c71b0b5fd41c  
    500_InternalServerError:
      description: Internal Server Error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemSchema'
          example:
            status: 500
            title: Internal Server Error
            detail: The server encountered an unexpected condition that prevented it from fulfilling
              the request.
    429_TooManyRequests:
      description: Too many requests in a short time.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemSchema'
          example:
            status: 429
            title: Too Many Requests
            detail: Too many requests within defined time period,please try again later.

    200_aggregate:
      description: Aggregate response
      content:
        application/json:
          schema:
            type: object
            required: [response]
            properties:
              response:
                type: object
                required:
                  - status
                  - timestamp
                  - customerId
                  - sessionId
                  - statusCode
                  - statusMessage
                  - shipmentId
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  customerId:
                    type: string
                  sessionId:
                    type: string
                  statusCode:
                    type: string
                    enum: [OK, ERROR]
                  statusMessage:
                    type: string
                  shipmentId:
                    type: string
                  container:
                    type: array
                    description: Only provided when labels are returned
                    items:
                      type: object
                      properties:
                        containerId:
                          type: string
                        label:
                          type: string
                          description: Base64 encoded label
  securitySchemes:
    OAuth2:
      type: oauth2
      description: This API uses OAuth 2 with the client-credentials grant flow
      flows:
        clientCredentials:
          tokenUrl: https://api-sandbox.dhl.com/ccc/v1/auth/accesstoken
          scopes: {}
