    cEventRequest:
      type: object
      properties:
        dataElement:
          type: object
          description: 'Container for the request data'
          properties:
            version: 
              type: string
              description: Version of the data message
            parcelOriginOrganization:
              type: string
              description: This field indicates the origin country of the parcel. ISO-3166 two-letter country code (capital lettters); format:- capital letters.
              example: AT
              maxLength: 2
            parcelDestinationOrganization:
              type: string
              description: This indicates which country is the recipient of the parcel. ISO-3166 two-letter country code(capital lettters); format:- capital letters.
              example: FR
              maxLength: 2
            general:
              type: object
              description: Container for the general data of request.
              properties:
                parcelIdentifier:
                  type: string
                  description: This describes the identifier that is used for parcel tracking.Example of parcelIdentifier of type ASC MH10:- JJD0000000000000001
                  example: Example of parcelIdentifier of type ASC MH10:-
                      JJD0000000000000001
                timestamp:
                  type: string
                  description: Timestamp at which the request data is passed to DHL eCS Europe API.
                    format:-
                      YYYY-MM-DDThh:mm:ssZ 
                      (or) YYYY-MM-DDThh:mm:ss+hh:mm 
                      (or) YYYY-MM-DDThh:mm:ss-hh:mm
                  example: Example of expressing the same time in the different formats:-
                          2022-07-01T13:05:05Z
                          2022-07-01T15:05:05+02:00
                          2022-07-01T11:05:05-02:00
                product:
                  type: string
                  description: This is the product of the parcel.
                     Please use:- ParcelEurope.parcelconnect for product DHL Parcel Connect, ParcelEurope.parcelInternational for product DHL Parcel International.
                customerIdentification:
                  type: string
                  description: Individual customer ID of sender. Will be provided to customers during onboarding process.
              required:
                - parcelIdentifier
                - timestamp
            cEvent:
              type: object
              description: Container for the general data of request.
              properties:
                eventType:
                  type: string
                  description: Classification of the activity executed in the event.  values:- DeliveredBusinessSender, Presorted3rdParty, PresentedExportCustoms, HandoverToTransport, PresentedImportCustoms, ReturnHubHandling, ReturnHubOutbound, HandoverFromCustomer.
                  example: DeliveredBusinessSender
                eventTime:
                  type: string
                  description: Timestamp of the transmitted event.
                     format:-
                          YYYY-MM-DDThh:mm:ssZ 
                          (or) YYYY-MM-DDThh:mm:ss+hh:mm 
                          (or) YYYY-MM-DDThh:mm:ss-hh:mm
                  example: 2022-07-01T13:05:05Z
                eventLocation:
                  type: string
                  description: This indicates which city the event is taking place.
                  example: Salzburg
                eventCountry:
                  type: string
                  description: This indicates which country the event is taking place. ISO-3166 two-letter country code.
                  example: AT
                eventCapturedBy:
                  description: This indicates who created the event. 
                  example: SomeCarrier
                comment: 
                  description: optional comment on event; will be stored but not evaluated.
              required:
                        - eventType
                        - eventTime
                        - eventLocation
                        - eventCountry
          required:
            - version
            - general
            - cEvent
      required:
        - dataElement
