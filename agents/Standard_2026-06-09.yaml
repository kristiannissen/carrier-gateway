                       - ParcelEurope.connectPlus for product "DHL Connect Plus"
                  example:
                     - ParcelEurope.parcelconnect,  
                     - ParcelEurope.parcelInternational,
                     - ParcelEurope.connectPlus
                routingCode:
                  type: string
                  description: This describes the identifier used for routing the parcel. It contains information about the data/ application identifier type used, recipient information and service information. No needed in case of product = ParcelEurope.parcelconnect and ParcelEurope.connectPlus.
                  example:
                customerIdentification:
                  type: string
                  description: Individual customer ID of sender. Will be provided to customers during onboarding process.
              required:
                - parcelIdentifier
                - timestamp
                - product
                - customerIdentification
            cCustoms:
              type: object
              properties:
                update:
                  type: boolean
                  description: Only used if product = ParcelEurope.parcelconnect AND parcelDestinationOrganization = GB. Set 'false' or do not provide, if customs data Element is provided the first time. Set 'true', if this is an update or a previously transferred customs data element.
                CustomsIDs:
                  type: object
                  description: Container for the customsIDs for sender and recipient. Needs to be included only if customsID information for the sender and/or recipient shall be specified.
                  properties:
                    sender:
                      type: object
                      description: Container for the customsIDs for sender. Needs to be included only if customsID information for the sender and/or recipient shall be specified. Maximum of 5 sender idType and identifer is allowed.
                      properties:
                        idType:
                          type: string
                          description: Information on the type of fiscal ID. Condition:- Must be provided if product is ParcelEurope.parcelInternational. In case of ParcelEurope.parcelConnect, the fiscalID must either provided here or by configuration. For more details please refer to the use cases or reach out to your DHL contact person.
                          example: VAT
                          maxLength: 35
                          enum:
                            - VAT
                            - EORI
                            - inboundVAT
                            - IOSS
                        identifier:
                          type: string
                          description: Fiscal ID of the sender.          Condition:- same as for idType
                          example: German VAT - DE 123456789
                          maxLength: 35
                    recipient:
                      type: object
                      description: Container for the customsIDs for recipient. Needs to be included only if customsID information for the sender and/or recipient shall be specified. condition:- must be provided if product = ParcelEurope.parcelInternational; if product = ParcelEurope.parcelconnect;
                      properties:
                        idType:
                          type: string
                          description: Information on the type of fiscal ID. Condition:- Must be provided if product is ParcelEurope.parcelInternational. In case of ParcelEurope.parcelConnect, the fiscalID must either provided here or by configuration. For more details please refer to the relevant use cases ("Get Started" Section) or reach out to your DHL contact person.
                          example: VAT
                          maxLength: 35
                          enum:
                            - VAT
                            - EORI
                            - inboundVAT
                        identifier:
                          type: string
                          description: Fiscal ID of the recipient.          Condition:- same as for idType
                          example: German VAT - DE 123456789
                          maxLength: 35
                shippingFee:
                  type: object
                  properties:
                    currency:
                      type: string
                      description: Currency of of the shipping fee to recipient.Note:- in case multiple currency elements are provided, use consistent currency in message. ISO 4217 alpha-3 currency codes. Must be provided if product = ParcelEurope.parcelInternational.
                      maxLength: 3
                    value:
                      type: string
                      description: Transportation costs for the shipment. Can be stated as "0.00" for parcel international. Must be provided if product = ParcelEurope.parcelInternational. format - nnnnn.nn; 
                      maxLength: 7
                insuranceCost:
                  type: object
                  properties:
                    value:
                      type: string
                      description: Insurance cost for the shipment. format - nnnnn.nn
                      maxLength: 15
                goodsDescription:
                  type: object
                  description: Container for the description of all the items in the shipment
                  properties:
                    general:
                      type: object
                      description: General information that refers to all items in the shipment
                      properties:
                        incoterms:
                          type: string
                          description: Incoterm as agreed between sender and recipient. DDP or DAP; Must be provided if product= ParcelEurope.parcelconnect
                          example: DDP
                          enum: 
                            - DDP
                            - DAP
                        goodsClassification:
                          type: string
                          description: Indication for customs for the Export Reason. Allowed values- corresponding names of UPU list 136 (Note:- CommercialGoods = Sale of goods; reason 11). Also note that in various customs scenarios not all values are allowed  check out the respective use case description (get started section and/ or reach out to your DHL contact to confirm the respective scenario allowed values)
                          example: CommercialGoods
                          enum:
                            - CommercialSaleOfGoods, 
                            - CommercialGoods, 
                            - UnwantedCommercialReturnGoods, 
                            - RepairReturnGoods, 
                            - WarrantyReturnGoods, 
                            - ReturnedItem, 
                            - Gift, 
                            - ProductSample, 
                            - MaterialForTheBlind, 
                            - HumanitarianAid, 
                            - GoodsForTesting, 
                            - LoanOfGoods, 
                            - Documents, 
                            - MixedContent, 
                            - FreeUsage, 
                            - Other
                          maxLength: 35
                        totalValue:
                          type: string
                          description: Sum of total values for all  items. Must be provided if product= ParcelEurope.parcelconnect
                          example: 183.50
                        currency:
                          type: string
                          description: Currency of sum of total values for  all  items (all item values must be given in this currency).Note:- in case multiple currency elements are provided:- use consistent currency in message. format - ISO 4217 alpha-3 currency codes
                          example: GBP
                          maxLength: 3
                        shipmentWeight:
                          type: string
                          description: Total gross weight of the shipment in kg.Must match weight provided in shipment data. Must be provided if product= ParcelEurope.parcelconnect format- nnnnn.nn; 
                          example: 5.45
                          maxLength: 8			
                    item:
                      type: object
                      properties:
                        description:
                          type: string
                          description: Description of the goods.
                          example: DHL coffee cup
                          maxLength: 35
                        customsTariffNumber:
                          type: string
                          description: Tariff Code to describe the goods (usually as HS-code)
                          example: 69120020
                          maxLength: 10
                        originCountry:
                          type: string
                          description: Country of origin (manufacture) of the content piece.  ISO-3166 two-letter country code; Must be provided if product= ParcelEurope.parcelconnect
                          example: NL
                          maxLength: 2
                        quantity:
                          type: string
                          description: Number of units of the piece
                          example: 4
                        netWeight:
                          type: string
                          description: Net weight of all Items of the described type (= weight of an individual item of the described type * quantity)Kg, format - xx.xxx ("." as separator, 3 decimals)
                          example: 0.500
                          maxLength: 8
                        value:
                          type: string
                          description: Gross value (incl. VAT) of all Items of the described type (= value of an individual item of the described type * quantity).
                          example:
                          maxLength: 9
                        currency:
                          type: string
                          description: Currency of the declared value. Note each item must be declared in the provided general/currency.Note:- in case multiple currency elements are provided:- use consistent currency in message.format- ISO 4217 alpha-3 currency codes; Must be provided if product= ParcelEurope.parcelconnect
                          example: GBP
                          maxLength: 3
                      required:
                        - description
                        - customsTariffNumber
                        - quantity
                        - netWeight
                  required:
                    - item						  
                customsDocuments:
                  type: object
                  properties:
                    document:
                      type: object
                      properties:
                        docType:
                          type: string
                          description: Classification of the document. if product = parcel international
                             Possible values - "INV" (for invoice), "LCS" (for license), "CRT" (for certificate); 
                             Must be provided if product = ParcelEurope.parcelInternational
                          maxLength: 3
                        identifier:
                          type: string
                          description: Identifier of the document. e.g. commercial invoice number as specified by the customer
                          example: 20220905_12345
                          maxLength: 35
                        name:
                          type: string
                          description: Filename of the encoded document. Must be provided if product= ParcelEurope.parcelconnect  AND destination = GB
                          example: invoice_test_example
                          maxLength: 255
                        binary:
                          type: string
                          description: Base64-encoded electronic document. File type can be determined by its magic number. Must be provided if product= ParcelEurope.parcelconnect  AND destination = GB
                        issueDate:
                          type: string
                          description: Issue date of the document. Must be provided if product= ParcelEurope.parcelconnect
                          example: 05-09-2022
                      required:
                        - identifier
                  required:
                    - document
                comment:
                  type: string
                  description: Additional information on the shipment to aid customs clearance processes
                  maxLength: 512
              required:
                - goodsDescription
          required:
            - general
            - cCustoms
            - parcelOriginOrganization
            - parcelDestinationOrganization
      required:
        - dataElement
    cPlusRequest:
      type: object
      description: 'Container for the request data'
      properties:
        dataElement:
          type: object
          properties:
            labelDetails:
              type: object
              description: >
                             Label generation controls. If omitted, default behavior applies.
                             - If `label = true` (default behavior), DHL generates a label and parcelId.
                             - If `label = false` (self-labeler), you MUST provide `general/shipmentID` and `general/routingCode`.
              properties:
                label:
                  type: boolean
                  description: >
                                 Label generation is required or not. Self-labeler actively must set "false", else per default a label and pacelId will be issued via eConnect.
                  example: >
                             Labels are returned in following resolution per format:
                             - pdf: n/a as pdf is scalable
                             - png: 300 dpi resolution
                             - zpl: 300 dpi resolution
                  enum:
                     - true
                     - false
                formatLabel:
                  type: string
                  description: If nothing is provided and label is to be generated:- default value "pdf"
                  enum:
                        - pdf
                        - png
                        - zpl
                size:
                  type: string
                  description:
                       Only applicable to label. Size is expressed in cm. If nothing is provided and label is to be generated:- default value "10x15" (cm)
                  enum:
                       - 10X15
                       - 10x21
            parcelOriginOrganization:
              type: string
              description: This field indicates the origin country of the parcel. ISO-3166 two-letter country code (capital lettters); format:- capital letters.
              example: ES
              maxLength: 2
            parcelDestinationOrganization:
              type: string
              description: This indicates which country is the recipient of the parcel. ISO-3166 two-letter country code(capital lettters); format:- capital letters.
              example: PL
