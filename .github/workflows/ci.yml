name: CI

on:
  push:
    branches: ["main"]
  schedule:
    # Run vulnerability scan weekly on Monday at 08:00 UTC even when no code
    # has changed — catches newly disclosed CVEs in existing dependencies.
    - cron: "0 8 * * 1"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check for stub files
        run: |
          if grep -rl '//go:build ignore' --include='*.go' .; then
            echo "Found //go:build ignore stub files — delete them with git rm instead of stubbing."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test with race detector
        run: go test -race -count=1 $(go list ./... | grep -v 'cmd/' | grep -v 'internal/router')

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.24"
          go-package: ./...
