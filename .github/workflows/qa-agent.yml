name: QA Agent - Test PR and Create Bug Issues

on:
  pull_request:
    types: [opened, synchronize, reopened]  # Trigger on PR open/update

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    permissions:
      issues: write  # Required to create issues
      pull-requests: read  # Required to read PR details

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # Checkout the PR branch

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run tests
        id: run-tests
        run: |
          # Run tests and capture output
          go test ./... -v > test_output.txt 2>&1 || echo "TESTS_FAILED=true" >> $GITHUB_ENV
          echo "test_output=$(cat test_output.txt)" >> $GITHUB_OUTPUT

      - name: Upload test output
        if: env.TESTS_FAILED == 'true'
        uses: actions/upload-artifact@v4  # Fixed: Updated to v4
        with:
          name: test-output
          path: test_output.txt

      - name: Create Bug Issue for Test Failures
        if: env.TESTS_FAILED == 'true'
        run: |
          # Extract PR number and test output
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_URL=${{ github.event.pull_request.html_url }}

          # Use GitHub API to create a bug issue
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{
              "title": "[BUG] Test Failure in PR #'"$PR_NUMBER"'",
              "body": "
              **PR:** [#'"$PR_NUMBER"']('"$PR_URL"')

              **Test Output:**
              \`\`\`
              ${{ steps.run-tests.outputs.test_output }}
              \`\`\`

              **How to Reproduce:**
              1. Checkout the PR branch: \`git checkout pr-'"$PR_NUMBER"'\`
              2. Run: \`go test ./... -v\`
              ",
              "labels": ["bug", "test-failure"]
            }' \
            "https://api.github.com/repos/${{ github.repository }}/issues"
